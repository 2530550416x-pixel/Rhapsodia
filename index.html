<!DOCTYPE html>
<html lang="zh-CN">
<!-- 禁用浏览器缓存 -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>设备备件库存管理(Excel兼容修复版)</title>
<!-- Supabase 官方CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
<!-- 替换为国内稳定SheetJS CDN（解决加载失败） -->
<script src="https://cdn.bootcdn.net/ajax/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#f5f7fa;padding:15px}
.container{max-width:1300px;margin:0 auto;background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 10px #eee}
h2{text-align:center;color:#2c3e50;margin-bottom:20px;font-size:18px}
.box{margin-bottom:25px;padding:15px;border:1px solid #e8e8e8;border-radius:8px}
.title{font-size:16px;font-weight:bold;margin-bottom:12px;color:#3498db;display:flex;justify-content:space-between;align-items:center}
.fold-btn{cursor:pointer;color:#0066cc;font-size:14px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
input,select,textarea{flex:1;min-width:160px;padding:9px;border:1px solid #ddd;border-radius:5px;outline:none;font-size:14px}
textarea{resize:none;height:60px}
button{padding:9px 12px;border:none;border-radius:5px;cursor:pointer;color:#fff;font-size:14px}
.btn-add{background:#27ae60}
.btn-out{background:#e67e22}
.btn-search{background:#3498db}
.btn-export{background:#9b59b6}
.btn-del{background:#e74c3c}
.btn-reset{background:#f39c12}
.btn-his{background:#8e44ad}
.btn-edit-text{background:#6c757d}
.btn-sm{padding:4px 8px;font-size:12px}
.tag-item{display:inline-block;padding:3px 8px;border:1px solid #ccc;border-radius:3px;margin:3px;cursor:pointer}
.tag-item:hover{background:#f0f0f0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #eee;padding:8px;text-align:center;font-size:13px}
th{background:#f0f5ff}
.warn-text{color:#ff0000 !important;font-weight:bold}
.tab{display:none}
.tab.active{display:block}
.tab-btn{margin:0 5px;padding:8px 15px;background:#eee;border:none;border-radius:5px;cursor:pointer}
.tab-btn.active{background:#3498db;color:#fff}
.fold-content{overflow:hidden;transition:all 0.3s ease}
.fold-close{max-height:0}
.fold-open{max-height:800px}
.edit-box{display:flex;gap:8px;align-items:center}
.check-item{width:16px;height:16px;cursor:pointer}
.sync-tip{color:#27ae60;font-size:12px;text-align:center;margin-bottom:10px}
@media(max-width:768px){
  .row{flex-direction:column}
  table{font-size:12px}
  th,td{padding:5px 2px}
}
</style>
</head>
<body>
<div class="container">
  <h2>设备备件库存管理(云端同步)</h2>
  <div class="sync-tip">✅ 云端同步已启用 | 支持 .xlsx 标准Excel</div>
  <div style="text-align:center;margin-bottom:15px">
    <button class="tab-btn active" onclick="switchTab(0)" title="切换到库存管理标签页">库存管理</button>
    <button class="tab-btn" onclick="switchTab(1)" title="切换到出入库历史记录标签页">出入库历史记录</button>
  </div>

  <!-- 库存管理 Tab -->
  <div class="tab active" id="tab0">
    <div class="box">
      <div class="title">库存精准查询</div>
      <div class="row">
        <input type="text" id="searchDevice" placeholder="所属设备查询" title="输入所属设备名称">
        <input type="text" id="searchSp" placeholder="备件名/型号搜索" title="输入备件名称或型号">
        <button class="btn-search" onclick="searchStock()" title="执行查询">查询</button>
        <button class="btn-reset" onclick="resetSearch()" title="重置条件">重置</button>
        <button class="btn-del btn-sm" onclick="batchDelete()" title="批量删除">批量删除选中</button>
      </div>
    </div>

    <div class="box">
      <div class="title">筛选结果 <span style="color:red">红色=低于预警库存</span></div>
      <table>
        <thead>
          <tr>
            <th><label for="checkAll"><input type="checkbox" class="check-item" id="checkAll" onclick="checkAllItem()" title="全选">全选</label></th>
            <th>ID</th>
            <th>分区</th>
            <th>设备</th>
            <th>备件</th>
            <th>型号</th>
            <th>库存</th>
            <th>预警</th>
            <th>位置</th>
          </tr>
        </thead>
        <tbody id="stockTable">
          <tr><td colspan="9" style="color:#999">暂无数据，请点击查询</td></tr>
        </tbody>
      </table>
    </div>

    <div class="box">
      <div class="title">备件入库 / 领用出库</div>
      <div class="row">
        <input type="text" id="editId" placeholder="备件ID" readonly title="选中行自动填充">
        <input type="number" id="changeNum" placeholder="操作数量" min="1">
        <textarea id="operRemark" placeholder="操作备注"></textarea>
      </div>
      <div class="row">
        <button class="btn-add" onclick="stockIn()">增补入库</button>
        <button class="btn-out" onclick="stockOut()">领用出库</button>
      </div>
    </div>

    <div class="box">
      <div class="title">库存总表</div>
      <div class="row">
        <button class="btn-search" onclick="openAllStockTable()">显示总表</button>
        <button class="btn-del" onclick="hideAllStockTable()">隐藏总表</button>
        <button class="btn-export" onclick="exportStockExcel()">导出Excel</button>
      </div>
      <div id="allStockBox" style="display:none;margin-top:15px">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>分区</th><th>设备</th><th>备件</th><th>型号</th><th>库存</th><th>预警</th><th>位置</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="allStockTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 15px #999;z-index:999;width:90%;max-width:420px">
      <h3 style="text-align:center;margin-bottom:15px">修改备件信息</h3>
      <input type="hidden" id="modalEditId">
      <div class="row">
        <input type="text" id="modalWareArea" placeholder="仓库分区">
        <input type="text" id="modalDevice" placeholder="所属设备">
      </div>
      <div class="row">
        <input type="text" id="modalSpName" placeholder="备件名称">
        <input type="text" id="modalModel" placeholder="备件型号">
      </div>
      <div class="row">
        <input type="number" id="modalNum" placeholder="库存数量" min="0">
        <input type="number" id="modalWarn" placeholder="预警数量" min="0">
      </div>
      <div class="row">
        <input type="text" id="modalPos" placeholder="存放位置">
      </div>
      <div class="row" style="justify-content:center;margin-top:15px">
        <button class="btn-add" onclick="saveEditInfo()">保存</button>
        <button class="btn-reset" onclick="closeEditModal()">取消</button>
      </div>
    </div>

    <!-- 备件录入 -->
    <div class="box">
      <div class="title">备件录入 <span class="fold-btn" onclick="toggleFold()">展开/折叠</span></div>
      <div class="fold-content fold-close" id="inputFold">
        <div class="row">
          <select id="wareArea" aria-label="仓库选择"></select>
          <input type="text" id="spName" placeholder="备件名称">
          <input type="text" id="spModel" placeholder="备件型号">
        </div>
        <div class="row">
          <input type="text" id="deviceName" placeholder="所属设备">
          <input type="number" id="spNum" placeholder="初始库存" min="0" value="0">
          <input type="number" id="lowWarn" placeholder="预警值" min="0" value="5">
          <input type="text" id="position" placeholder="存放位置">
        </div>
        <div class="row">
          <button class="btn-add" onclick="addStock()">新建入库</button>
        </div>
        <div class="row">
          <input type="file" id="importFile" accept=".xlsx,.xls" onchange="importExcelData()">
          <button class="btn-his" onclick="alert('表头：仓库分区、备件名称、型号、所属设备、数量、预警数、存放位置\n禁止合并单元格/空行')">导入说明</button>
        </div>
      </div>
    </div>

    <!-- 分区管理 -->
    <div class="box">
      <div class="title">分区管理 <span class="fold-btn" onclick="toggleBaseFold()">展开/折叠</span></div>
      <div class="fold-content fold-close" id="baseFold">
        <div class="row edit-box">
          <input type="text" id="newArea" placeholder="新增分区名称">
          <button class="btn-edit-text" onclick="addWareArea()">添加分区</button>
        </div>
        <div class="row">
          <span>现有分区：</span>
          <div id="areaTagList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 历史记录 Tab -->
  <div class="tab" id="tab1">
    <div class="box">
      <div class="title">出入库流水记录</div>
      <div style="text-align:right;margin-bottom:10px">
        <button class="btn-del btn-sm" onclick="batchDeleteHistory()">批量删除</button>
        <button class="btn-his" onclick="exportHistoryExcel()">导出记录</button>
      </div>
      <table>
        <thead>
          <tr>
            <th><label for="checkAllHis"><input type="checkbox" class="check-item" id="checkAllHis" onclick="checkAllHistory()">全选</label></th>
            <th>编号</th><th>时间</th><th>类型</th><th>备件</th><th>型号</th><th>设备</th><th>变动</th><th>备注</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// Supabase 配置
const supabaseUrl = 'https://zebridjvutczgzdthyuw.supabase.co';
const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplYnJpZGp2dXRjemd6ZHRoeXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNTYzNjgsImV4cCI6MjA5NjYzMjM2OH0.Xpnf0Ygr2tJGbwtzJOws46_Rmfqh4CWFks-qTOQpwCQ';
const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

// 实时订阅变量
let areaSub, stockSub, historySub;
const RECONNECT_INTERVAL = 5000;

// 页面加载
window.onload = async function() {
  // 检测XLSX库是否加载成功
  if (typeof XLSX === "undefined") {
    alert("Excel组件加载失败，请检查网络或更换浏览器！");
  }
  await initAllData();
  startRealtime();
  window.addEventListener('online', async () => await initAllData());
};

window.onbeforeunload = function() {
  if(areaSub) supabase.removeChannel(areaSub);
  if(stockSub) supabase.removeChannel(stockSub);
  if(historySub) supabase.removeChannel(historySub);
};

async function initAllData() {
  try {
    await renderAreaSelect();
    await renderAreaTags();
    await renderHistory();
    await searchStock();
  } catch (e) {
    console.error("初始化失败", e);
    alert("网络异常，请刷新页面");
  }
}

// 实时监听
function startRealtime() {
  areaSub = supabase.channel('area_channel')
  .on('postgres_changes', { event:'*', schema:'public', table:'ware_areas' }, async () => {
    await renderAreaSelect(); await renderAreaTags();
  }).subscribe(status => {if(status === 'CHANNEL_ERROR') setTimeout(startRealtime, RECONNECT_INTERVAL)});

  stockSub = supabase.channel('stock_channel')
  .on('postgres_changes', { event:'*', schema:'public', table:'spare_stock' }, async () => {
    await searchStock(); if(document.getElementById("allStockBox").style.display === "block") openAllStockTable();
  }).subscribe(status => {if(status === 'CHANNEL_ERROR') setTimeout(startRealtime, RECONNECT_INTERVAL)});

  historySub = supabase.channel('history_channel')
  .on('postgres_changes', { event:'*', schema:'public', table:'oper_history' }, async () => {
    await renderHistory();
  }).subscribe(status => {if(status === 'CHANNEL_ERROR') setTimeout(startRealtime, RECONNECT_INTERVAL)});
}

function switchTab(idx) {
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",i===idx));
  document.querySelectorAll(".tab-btn").forEach((el,i)=>el.classList.toggle("active",i===idx));
  if(idx === 1) renderHistory();
}

// 仓库分区
async function renderAreaSelect(){const {data}=await supabase.from('ware_areas').select('area_name').order('id');const sel=document.getElementById("wareArea");sel.innerHTML='';(data||[]).forEach(item=>{const o=document.createElement('option');o.value=item.area_name;o.innerText=item.area_name;sel.appendChild(o);})}
async function renderAreaTags(){const {data}=await supabase.from('ware_areas').select('area_name').order('id');const box=document.getElementById("areaTagList");box.innerHTML='';(data||[]).forEach(item=>{const s=document.createElement('span');s.className='tag-item';s.innerHTML=`${item.area_name} <span style="color:#e74c3c;cursor:pointer" onclick="deleteArea('${item.area_name}')">×</span> <span style="color:#3498db;cursor:pointer" onclick="editArea('${item.area_name}')">✎</span>`;box.appendChild(s);})}
async function addWareArea(){const v=document.getElementById("newArea").value.trim();if(!v)return alert('请输入分区');const {error}=await supabase.from('ware_areas').insert({area_name:v});if(error)return alert('添加失败');document.getElementById("newArea").value='';alert('添加成功')}
async function editArea(old){const n=prompt('修改名称',old);if(!n||n.trim()===old)return;const {error}=await supabase.from('ware_areas').update({area_name:n.trim()}).eq('area_name',old);if(error)return alert('修改失败');await supabase.from('spare_stock').update({ware_area:n.trim()}).eq('ware_area',old);alert('修改成功')}
async function deleteArea(name){if(!confirm(`删除${name}?`))return;const {error}=await supabase.from('ware_areas').delete().eq('area_name',name);if(error)return alert('删除失败');alert('删除成功')}

// ID生成
function generateSpId(n,m){return n.trim().replace(/\s+/g,'').toLowerCase()+"-"+m.trim().replace(/\s+/g,'').toLowerCase()}

// 库存查询
async function searchStock(){const d=document.getElementById("searchDevice").value.trim().toLowerCase();const s=document.getElementById("searchSp").value.trim().toLowerCase();const {data}=await supabase.from('spare_stock').select('');let res=(data||[]).filter(x=>{const dev=(x.device||'').toLowerCase(),sp=(x.sp_name||'').toLowerCase(),md=(x.model||'').toLowerCase();return (d?dev.includes(d):true)&&(s?(sp.includes(s)||md.includes(s)):true)});renderTable(res)}
function selectRow(id){document.getElementById("editId").value=id}
function renderTable(list){const tb=document.getElementById("stockTable");tb.innerHTML='';if(!list.length){tb.innerHTML='<tr><td colspan="9" style="color:#999">无数据</td>';return}list.forEach(item=>{const tr=document.createElement('tr');if(item.num<=item.low_warn)tr.className='warn-text';tr.onclick=e=>{if(e.target.type!=='checkbox')selectRow(item.id)};tr.innerHTML=`<td><input class="rowCheck" type="checkbox" value="${item.id}"></td><td>${item.id}</td><td>${item.ware_area}</td><td>${item.device}</td><td>${item.sp_name}</td><td>${item.model}</td><td>${item.num}</td><td>${item.low_warn}</td><td>${item.position}</td>`;tb.appendChild(tr)})}
function checkAllItem(){document.querySelectorAll(".rowCheck").forEach(c=>c.checked=document.getElementById("checkAll").checked)}
async function batchDelete(){const arr=Array.from(document.querySelectorAll(".rowCheck:checked")).map(c=>c.value);if(!arr.length)return alert('请勾选');if(!confirm('确定删除?'))return;await supabase.from('spare_stock').delete().in('id',arr);document.getElementById("checkAll").checked=false;alert('完成');searchStock()}
function resetSearch(){document.getElementById("searchDevice").value='';document.getElementById("searchSp").value='';document.getElementById("stockTable").innerHTML='<tr class="empty-row"><td colspan="9" style="color:#999">暂无数据，请点击查询</td>';document.getElementById("checkAll").checked=false}

// 新建备件
async function addStock(){const area=document.getElementById("wareArea").value;const name=document.getElementById("spName").value.trim();const model=document.getElementById("spModel").value.trim();const dev=document.getElementById("deviceName").value.trim();const num=parseInt(document.getElementById("spNum"))||0;const warn=parseInt(document.getElementById("lowWarn"))||5;const pos=document.getElementById("position").trim();if(!area||!name||!model||!dev)return alert('请填写完整');const id=generateSpName(name,model);const {data:exist}=await supabase.from('spare_stock').select('id').eq('id',id).single();if(exist)return alert('备件已存在');await supabase.from('spare_stock').insert({id,ware_area:area,device:dev,sp_name:name,model,num,low_warn:warn,position:pos});await supabase.from('oper_history').insert({hid:Date.now(),time:new Date().toLocaleString(),type:"初始录入",sp_name:name,model,device:dev,change_num:num,note:"新建入库"});document.getElementById("spName").value='';document.getElementById("spModel").value='';document.getElementById("deviceName").value='';document.getElementById("spNum").value='';document.getElementById("lowWarn").value='5';document.getElementById("position").value='';alert('入库成功')}

// 出入库
async function stockIn(){const id=document.getElementById("editId").value;const num=parseInt(document.getElementById("changeNum"));const note=document.getElementById("operRemark").trim();if(!id||!num||!note)return alert('填写完整');const {data:item}=await supabase.from('spare_stock').select('*').eq('id',id).single();if(!item)return alert('未找到');await supabase.from('spare_stock').update({num:item.num+num}).eq('id',id);await supabase.from('oper_history').insert({hid:Date.now(),time:new Date().toLocaleString(),type:"增补入库",sp_name:item.sp_name,model:item.model,device:item.device,change_num:num,note});document.getElementById("changeNum").value='';document.getElementById("operRemark").value='';alert('入库成功');searchStock()}
async function stockOut(){const id=document.getElementById("editId").value;const num=parseInt(document.getElementById("changeNum"));const note=document.getElementById("operRemark").trim();if(!id||!num||!note)return alert('填写完整');const {data:item}=await supabase.from('spare_stock').select('*').eq('id',id).single();if(!item||item.num<num)return alert('库存不足');await supabase.from('spare_stock').update({num:item.num-num}).eq('id',id);await supabase.from('oper_history').insert({hid:Date.now(),time:new Date().toLocaleString(),type:"领用出库",sp_name:item.sp_name,model:item.model,device:item.device,change_num:num,note});document.getElementById("changeNum").value='';document.getElementById("operRemark").value='';alert('出库成功');searchStock()}

// 历史记录
async function renderHistory(){const {data}=await supabase.from('oper_history').select('*').order('time',{asc:false});const tb=document.getElementById("historyTable");tb.innerHTML='';(data||[]).forEach(h=>{const t=h.type.includes("入库")||h.type.includes("录入")?`+${h.change_num}`:`-${h.change_num}`;const tr=document.createElement('tr');tr.innerHTML=`<td><input class="rowCheckHis" type="checkbox" value="${h.hid}"></td><td>${h.hid}</td><td>${h.time}</td><td>${h.type}</td><td>${h.sp_name}</td><td>${h.model||'-'}</td><td>${h.device}</td><td>${t}</td><td>${h.note}</td><td><button class="btn-del btn-sm" onclick="deleteHistory(${h.hid})">删除</button></td>`;tb.appendChild(tr)})}
async function deleteHistory(hid){if(!confirm('删除?'))return;await supabase.from('oper_history').delete().eq('hid',hid);renderHistory()}
function checkAllHistory(){document.querySelectorAll(".rowCheckHis").forEach(c=>c.checked=document.getElementById("checkAllHis").checked)}
async function batchDeleteHistory(){const arr=Array.from(document.querySelectorAll(".rowCheckHis:checked")).map(c=>Number(c.value));if(!arr.length)return alert('请勾选');if(!confirm('确定?'))return;await supabase.from('oper_history').delete().in('hid',arr);document.getElementById("checkAllHis").checked=false;alert('完成');renderHistory()}

// 库存总表 & 编辑
async function openAllStockTable(){document.getElementById("allStockBox").style.display='block';const {data}=await supabase.from('spare_stock').select('');const tb=document.getElementById("allStockTableBody");tb.innerHTML='';if(!data.length){tb.innerHTML='<tr><td colspan="9" style="color:#999">无数据</td>';return}data.forEach(item=>{const tr=document.createElement('tr');if(item.num<=item.low_warn)tr.className='warn-text';tr.innerHTML=`<td>${item.id}</td><td>${item.ware_area}</td><td>${item.device}</td><td>${item.sp_name}</td><td>${item.model}</td><td>${item.num}</td><td>${item.low_warn}</td><td>${item.position}</td><td><button class="btn-edit-text btn-sm" onclick="openEditModal('${item.id}')">编辑</button></td>`;tb.appendChild(tr)})}
function hideAllStockTable(){document.getElementById("allStockBox").style.display='none'}
async function openEditModal(id){const {data}=await supabase.from('spare_stock').select('*').eq('id',id).single();if(!data)return;document.getElementById("modalEditId").value=id;document.getElementById("modalWareArea").value=data.ware_area;document.getElementById("modalDevice").value=data.device;document.getElementById("modalSpName").value=data.sp_name;document.getElementById("modalModel").value=data.model;document.getElementById("modalNum").value=data.num;document.getElementById("modalWarn").value=data.low_warn;document.getElementById("modalPos").value=data.position;document.getElementById("editModal").style.display='block'}
function closeEditModal(){document.getElementById("editModal").style.display='none'}
async function saveEditInfo(){const id=document.getElementById("modalEditId").value;const area=document.getElementById("modalWareArea").trim();const dev=document.getElementById("modalDevice").trim();const name=document.getElementById("modalSpName").trim();const model=document.getElementById("modalModel").trim();const num=parseInt(document.getElementById("modalNum"))||0;const warn=parseInt(document.getElementById("modalWarn"))||0;const pos=document.getElementById("modalPos").trim();if(!area||!dev||!name||!model)return alert('必填项不能为空');await supabase.from('spare_stock').update({ware_area:area,device:dev,sp_name:name,model,num,low_warn:warn,position:pos}).eq('id',id);closeEditModal();alert('修改成功');searchStock()}

// 折叠

// ===================== 核心修复：Excel导入（双读取模式+强兼容） =====================
async function importExcelData() {
  const fileInput = document.getElementById("importFile");
  const file = fileInput.files[0];
  if (!file) {
    alert("请选择Excel文件");
    return;
  }
  // 基础格式判断
  const fileName = file.name.toLowerCase();
  if (!fileName.endsWith(".xlsx") && !fileName.endsWith(".xls")) {
    alert("仅支持 .xlsx / .xls 格式");
    fileInput.value = "";
    return;
  }

  const reader = new FileReader();
  // 全局捕获异常
  reader.onerror = () => {
    alert("文件读取失败，文件损坏/加密，请更换文件");
    fileInput.value = "";
    return;
  };

  // 优先使用 BinaryString 模式（兼容移动端/老旧浏览器）
  reader.onload = async function (e) {
    try {
      let workbook;
      // 双模式兼容
      try {
        // 模式1：二进制字符串（高兼容）
        const binary = e.target.result;
        workbook = XLSX.read(binary, { type: "binary", recover: true });
      } catch (err1) {
        // 模式2：备用ArrayBuffer
        const ab = await file.arrayBuffer();
        workbook = XLSX.read(new Uint8Array(ab), { type: "array", recover: true });
      }

      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      // 转为JSON，自动忽略空行
      const jsonData = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      if (jsonData.length === 0) {
        alert("Excel内无有效数据");
        fileInput.value = "";
        return;
      }

      // 校验表头
      const needFields = ["仓库分区", "备件名称", "型号", "所属设备", "数量", "预警数", "存放位置"];
      const firstRow = jsonData[0];
      const lack = needFields.filter(f => !Object.prototype.hasOwnProperty.call(firstRow, f));
      if (lack.length > 0) {
        alert(`表头缺失：${lack.join("")}，请使用标准模板`);
        fileInput.value = "";
        return;
      }

      let success = 0, fail = 0;
      for (let row of jsonData) {
        const wareArea = (row["仓库分区"] || "").trim();
        const spName = (row["备件名称"] || "").trim();
        const model = (row["型号"] || "").trim();
        const device = (row["所属设备"] || "").trim();
        const num = parseInt(row["数量"]) || 0;
        const warn = parseInt(row["预警数"]) || 5;
        const pos = (row["存放位置"] || "").trim();

        if (!wareArea || !spName || !model || !device) {
          fail++;
          continue;
        }

        const spId = generateSpId(spName, model);
        const { data: existItem } = await supabase.from('spare_stock').select('id, num').eq('id', spId).single();
        if (existItem) {
          await supabase.from('spare_stock').update({ num: existItem.num + num, low_warn: warn, position: pos, ware_area: wareArea }).eq('id', spId);
        } else {
          await supabase.from('spare_stock').insert({ id: spId, ware_area: wareArea, device, sp_name: spName, model, num, low_warn: warn, position: pos });
        }
        // 写入历史
        await supabase.from('oper_history').insert({
          hid: Date.now() + success,
          time: new Date().toLocaleString(),
          type: "Excel批量导入",
          sp_name: spName,
          model,
          device,
          change_num: num,
          note: "Excel批量导入"
        });
        success++;
      }
      alert(`导入完成！成功${success}条，失败${fail}条`);
    } catch (err) {
      console.error("Excel解析错误：", err);
      alert("解析失败！排查：1.取消合并单元格 2.删除空行 3.使用标准xlsx");
    } finally {
      fileInput.value = "";
    }
  };
  // 优先使用二进制读取（移动端最优）
  reader.readAsBinaryString(file);
}

// Excel导出
async function exportStockExcel(){const {data}=await supabase.from('spare_stock').select('');if(!data.length)return alert('暂无数据');const exp=data.map(x=>({ID:x.id,仓库分区:x.ware_area,所属设备:x.device,备件名称:x.sp_name,型号:x.model,库存:x.num,预警下限:x.low_warn,存放位置:x.position}));const ws=XLSX.utils.json_to_sheet(exp);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws);XLSX.writeFile(wb,`备件库存_${new Date().toLocaleDateString()}.xlsx`)}
async function exportHistoryExcel(){const {data}=await supabase.from('oper_history').select('');if(!data.length)return alert('暂无记录');const exp=data.map(x=>({流水编号:x.hid,操作时间:x.time,操作类型:x.type,备件名称:x.sp_name,型号:x.model,所属设备:x.device,变动数量:x.change_num,操作备注:x.note}));const ws=XLSX.utils.json_to_sheet(exp);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws);XLSX.writeFile(wb,`出入库记录_${new Date().toLocaleDateString()}.xlsx`)}
</script>
