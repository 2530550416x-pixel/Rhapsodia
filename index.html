<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备备件库存管理系统</title>
<!-- 引入 Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js"></script>
<!-- 引入 XLSX 库 -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#f5f7fa;padding:15px}
.container{max-width:1300px;margin:0 auto;background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 10px #eee}
h2{text-align:center;color:#2c3e50;margin-bottom:20px}
.box{margin-bottom:25px;padding:15px;border:1px solid #e8e8e8;border-radius:8px}
.title{font-size:16px;font-weight:bold;margin-bottom:12px;color:#3498db;display:flex;justify-content:space-between;align-items:center}
.fold-btn{cursor:pointer;color:#0066cc;font-size:14px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
input,select,textarea{flex:1;min-width:160px;padding:9px;border:1px solid #ddd;border-radius:5px;outline:none}
textarea{resize:none;height:60px}
button{padding:9px 12px;border:none;border-radius:5px;cursor:pointer;color:#fff;font-size:14px}
.btn-add{background:#27ae60}
.btn-out{background:#e67e22}
.btn-search{background:#3498db}
.btn-export{background:#9b59b6}
.btn-del{background:#e74c3c}
.btn-reset{background:#f39c12}
.btn-his{background:#8e44ad}
.btn-edit-text{background:#6c757d}
.btn-sm{padding:4px 8px;font-size:12px}
.tag-item{display:inline-block;padding:3px 8px;border:1px solid #ccc;border-radius:3px;margin:3px;cursor:pointer}
.tag-item:hover{background:#f0f0f0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #eee;padding:8px;text-align:center;font-size:13px}
th{background:#f0f5ff}
/* 预警物料红色字体 */
.warn-text{color:#ff0000 !important;font-weight:bold}
.tab{display:none}
.tab.active{display:block}
.tab-btn{margin:0 5px;padding:8px 15px;background:#eee;border:none;border-radius:5px;cursor:pointer}
.tab-btn.active{background:#3498db;color:#fff}
.fold-content{overflow:hidden;transition:all 0.3s ease}
.fold-close{max-height:0}
.fold-open{max-height:800px}
.edit-box{display:flex;gap:8px;align-items:center}
.check-item{width:16px;height:16px;cursor:pointer}
@media(max-width:768px){.row{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <h2>设备备件库存管理系统</h2>
  <div style="text-align:center;margin-bottom:15px">
    <button class="tab-btn active" onclick="switchTab(0)">库存管理</button>
    <button class="tab-btn" onclick="switchTab(1)">出入库历史记录</button>
  </div>

  <!-- 库存管理 Tab -->
  <div class="tab active" id="tab0">
    <!-- 库存精准查询 -->
    <div class="box">
      <div class="title">库存精准查询</div>
      <div class="row">
        <input type="text" id="searchDevice" placeholder="所属设备查询">
        <input type="text" id="searchSp" placeholder="备件名/型号搜索">
        <button class="btn-search" onclick="searchStock()">查询</button>
        <button class="btn-reset" onclick="resetSearch()">重置</button>
        <button class="btn-del btn-sm" onclick="batchDelete()">批量删除选中</button>
      </div>
    </div>

    <!-- 筛选结果清单 -->
    <div class="box">
      <div class="title">筛选结果清单 <span style="color:red">红色字体 = 低于预警库存</span></div>
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" class="check-item" id="checkAll" onclick="checkAllItem()">全选</th>
            <th>ID</th>
            <th>仓库分区</th>
            <th>所属设备</th>
            <th>备件名称</th>
            <th>型号</th>
            <th>当前库存</th>
            <th>预警下限</th>
            <th>存放位置</th>
          </tr>
        </thead>
        <tbody id="stockTable">
          <tr class="empty-row"><td colspan="9" style="color:#999">暂无数据，请点击查询</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 备件入库 / 领用出库 -->
    <div class="box">
      <div class="title">备件入库 / 领用出库</div>
      <div class="row">
        <input type="text" id="editId" placeholder="备件ID" readonly>
        <input type="number" id="changeNum" placeholder="操作数量" min="1">
        <textarea id="operRemark" placeholder="本次操作备注"></textarea>
      </div>
      <div class="row">
        <button class="btn-add" onclick="stockIn()">增补入库</button>
        <button class="btn-out" onclick="stockOut()">领用出库</button>
      </div>
    </div>

    <!-- 库存总表一键查看 -->
    <div class="box">
      <div class="title">库存总表一键查看</div>
      <div class="row">
        <button class="btn-search" onclick="openAllStockTable()">显示库存总表</button>
        <button class="btn-del" onclick="hideAllStockTable()">隐藏库存总表</button>
        <button class="btn-export" onclick="exportStockExcel()">导出全部库存总表</button>
      </div>
      <div id="allStockBox" style="display:none;margin-top:15px">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>仓库分区</th>
              <th>所属设备</th>
              <th>备件名</th>
              <th>型号</th>
              <th>库存</th>
              <th>预警值</th>
              <th>存放位置</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="allStockTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 15px #999;z-index:999;width:420px">
      <h3 style="margin-bottom:15px;text-align:center">修改备件信息</h3>
      <input type="hidden" id="modalEditId">
      <div class="row">
        <input type="text" id="modalWareArea" placeholder="仓库分区">
        <input type="text" id="modalDevice" placeholder="所属设备">
      </div>
      <div class="row">
        <input type="text" id="modalSpName" placeholder="备件名称">
        <input type="text" id="modalModel" placeholder="备件型号">
      </div>
      <div class="row">
        <input type="number" id="modalNum" placeholder="库存数量" min="0">
        <input type="number" id="modalWarn" placeholder="预警数量" min="0">
      </div>
      <div class="row">
        <input type="text" id="modalPos" placeholder="存放位置">
      </div>
      <div class="row" style="justify-content:center;margin-top:15px">
        <button class="btn-add" onclick="saveEditInfo()">保存修改</button>
        <button class="btn-reset" onclick="closeEditModal()">取消</button>
      </div>
    </div>

    <!-- 备件信息录入 -->
    <div class="box">
      <div class="title"> 备件信息录入 <span class="fold-btn" onclick="toggleFold()">点击展开/折叠</span> </div>
      <div class="fold-content fold-close" id="inputFold">
        <div class="row">
          <select id="wareArea"></select>
          <input type="text" id="spName" placeholder="备件名称">
          <input type="text" id="spModel" placeholder="备件型号">
        </div>
        <div class="row">
          <input type="text" id="deviceName" placeholder="所属设备名称">
          <input type="number" id="spNum" placeholder="初始库存数量" min="0">
          <input type="number" id="lowWarn" placeholder="最低预警数量" min="0" value="5">
          <input type="text" id="position" placeholder="具体存放位置">
        </div>
        <div class="row">
          <button class="btn-add" onclick="addStock()">新建备件入库</button>
        </div>
        <div class="row" style="margin-top:10px">
          <input type="file" id="importFile" accept=".xlsx,.xls" onchange="importExcelData()">
          <button class="btn-his" onclick="alert('导入模板字段：仓库分区、备件名称、型号、所属设备、数量、预警数、存放位置')">查看导入说明</button>
        </div>
      </div>
    </div>

    <!-- 基础数据管理 -->
    <div class="box">
      <div class="title"> 基础数据管理（新增/修改/删除） <span class="fold-btn" onclick="toggleBaseFold()">点击展开/折叠</span> </div>
      <div class="fold-content fold-close" id="baseFold">
        <div class="row edit-box">
          <input type="text" id="newArea" placeholder="新增仓库分区">
          <button class="btn-edit-text" onclick="addWareArea()">添加分区</button>
        </div>
        <div class="row">
          <span>现有分区（点击修改/删除）：</span>
          <div id="areaTagList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 出入库历史记录 Tab -->
  <div class="tab" id="tab1">
    <div class="box">
      <div class="title">出入库流水记录</div>
      <div style="text-align:right;margin-bottom:10px">
        <button class="btn-del btn-sm" onclick="batchDeleteHistory()">批量删除</button>
        <button class="btn-his" onclick="exportHistoryExcel()">导出全部历史记录</button>
      </div>
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" class="check-item" id="checkAllHis" onclick="checkAllHistory()">全选</th>
            <th>流水编号</th>
            <th>操作时间</th>
            <th>操作类型</th>
            <th>备件名称</th>
            <th>型号</th>
            <th>所属设备</th>
            <th>变动数量</th>
            <th>操作备注</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// 初始化 Supabase 客户端
const supabaseUrl = 'https://zebridjvutczgzdthyuw.supabase.co';
const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplYnJpZGp2dXRjemd6ZHRoeXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNTYzNjgsImV4cCI6MjA5NjYzMjM2OH0.Xpnf0Ygr2tJGbwtzJOws46_Rmfqh4CWFks-qTOQpwCQ';
const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

// ================= 初始化与基础逻辑 =================
async function initBaseData() {
  // 检查仓库分区表是否有数据，没有则初始化
  const { data: areaData } = await supabase.from('ware_areas').select('*');
  if (!areaData || areaData.length === 0) {
    const defaultAreas = ["A区货架","B区货架","C区耗材区","备品专库区","室外堆放区"];
    for (const area of defaultAreas) {
      await supabase.from('ware_areas').insert({ area_name: area });
    }
  }
  await renderAreaSelect();
  await renderAreaTags();
}

window.onload = async function() {
  await initBaseData();
  await renderHistory();
};

function switchTab(idx) {
  document.querySelectorAll(".tab").forEach((el, i) => el.classList.toggle("active", i === idx));
  document.querySelectorAll(".tab-btn").forEach((el, i) => el.classList.toggle("active", i === idx));
  if (idx === 1) renderHistory();
}

// ================= 库存管理核心逻辑 =================
async function searchStock() {
  let dKey = String(document.getElementById("searchDevice").value || '').trim().toLowerCase();
  let sKey = String(document.getElementById("searchSp").value || '').trim().toLowerCase();

  let { data: allStock } = await supabase.from('spare_stock').select('*');
  allStock = allStock || [];
  let res = [];

  if (dKey === '' && sKey === '') {
    // 未输入任何条件，仅显示等于或小于预警下限的物料
    res = allStock.filter(item => item.num <= item.low_warn);
  } else {
    // 关键字过滤
    res = allStock.filter(item => {
      let deviceStr = String(item.device || '').toLowerCase();
      let spNameStr = String(item.sp_name || '').toLowerCase();
      let modelStr = String(item.model || '').toLowerCase();
      
      let matchDev = dKey === '' || deviceStr.includes(dKey);
      let matchSp = sKey === '' || spNameStr.includes(sKey) || modelStr.includes(sKey);
      
      return matchDev && matchSp;
    });
  }
  renderTable(res);
}

function selectRow(id, name, model) {
  document.getElementById("editId").value = id;
  console.log(`已选中：${name} (${model})`);
}

function renderTable(list) {
  let tb = document.getElementById("stockTable");
  tb.innerHTML = "";
  
  if (!list.length) {
    tb.innerHTML = '<tr><td colspan="9" style="color:#999;text-align:center">未查询到符合条件的物料</td></tr>';
    return;
  } 
  
  list.forEach(item => {
    let tr = document.createElement("tr");
    if (item.num <= item.low_warn) tr.className = "warn-text";
    
    tr.onclick = function(e) {
      if (e.target.type !== 'checkbox') {
        selectRow(item.id, item.sp_name, item.model);
      }
    };
    
    tr.innerHTML = `
      <td><input type="checkbox" class="check-item rowCheck" value="${item.id}"></td>
      <td>${item.id}</td>
      <td>${item.ware_area}</td>
      <td>${item.device}</td>
      <td>${item.sp_name}</td>
      <td>${item.model}</td>
      <td>${item.num}</td>
      <td>${item.low_warn}</td>
      <td>${item.position}</td>
    `;
    tb.appendChild(tr);
  });
}

function checkAllItem() {
  let allCheck = document.getElementById("checkAll").checked;
  let checks = document.querySelectorAll(".rowCheck");
  checks.forEach(c => c.checked = allCheck);
}

async function batchDelete() {
  let checks = document.querySelectorAll(".rowCheck:checked");
  if (checks.length === 0) {
    alert("请先勾选要删除的数据");
    return;
  }
  if (!confirm(`确定批量删除选中 ${checks.length} 条备件？不可恢复`)) return;
  
  let delIds = [];
  checks.forEach(c => delIds.push(c.value));
  
  // 删除库存数据
  const { error } = await supabase
    .from('spare_stock')
    .delete()
    .in('id', delIds);
  
  if (error) {
    alert(`删除失败：${error.message}`);
    return;
  }
  
  alert("批量删除完成");
  document.getElementById("checkAll").checked = false;
  await searchStock();
}

function resetSearch() {
  document.getElementById("searchDevice").value = "";
  document.getElementById("searchSp").value = "";
  document.getElementById("stockTable").innerHTML = '<tr class="empty-row"><td colspan="9" style="color:#999;text-align:center">暂无数据，请点击查询</td></tr>';
  document.getElementById("checkAll").checked = false;
}

// ================= 入库 / 出库 逻辑 =================
async function stockIn() {
  let id = document.getElementById("editId").value;
  let inNum = parseInt(document.getElementById("changeNum").value);
  let note = document.getElementById("operRemark").value.trim();
  
  if (!id || !inNum || !note) {
    alert("请选中备件、填写数量与备注！");
    return;
  }
  
  // 获取当前备件信息
  const { data: [stockItem], error: stockError } = await supabase
    .from('spare_stock')
    .select('*')
    .eq('id', id)
    .single();
  
  if (stockError || !stockItem) {
    alert("未找到备件");
    return;
  }
  
  // 更新库存
  const newNum = stockItem.num + inNum;
  const { error: updateError } = await supabase
    .from('spare_stock')
    .update({ num: newNum })
    .eq('id', id);
  
  if (updateError) {
    alert(`入库失败：${updateError.message}`);
    return;
  }
  
  // 生成历史记录
  const historyItem = {
    hid: Date.now(),
    time: new Date().toLocaleString(),
    type: "增补入库",
    sp_name: stockItem.sp_name,
    model: stockItem.model,
    device: stockItem.device,
    change_num: inNum,
    note: note
  };
  
  const { error: historyError } = await supabase
    .from('oper_history')
    .insert(historyItem);
  
  if (historyError) {
    alert(`记录入库历史失败：${historyError.message}`);
    return;
  }
  
  alert("入库成功！");
  document.getElementById("changeNum").value = "";
  document.getElementById("operRemark").value = "";
  await searchStock();
}

async function stockOut() {
  let id = document.getElementById("editId").value;
  let outNum = parseInt(document.getElementById("changeNum").value);
  let note = document.getElementById("operRemark").value.trim();
  
  if (!id || !outNum || !note) {
    alert("请选中备件、填写数量与备注！");
    return;
  }
  
  // 获取当前备件信息
  const { data: [stockItem], error: stockError } = await supabase
    .from('spare_stock')
    .select('*')
    .eq('id', id)
    .single();
  
  if (stockError || !stockItem) {
    alert("未找到备件");
    return;
  }
  
  if (stockItem.num < outNum) {
    alert("库存不足！");
    return;
  }
  
  // 更新库存
  const newNum = stockItem.num - outNum;
  const { error: updateError } = await supabase
    .from('spare_stock')
    .update({ num: newNum })
    .eq('id', id);
  
  if (updateError) {
    alert(`出库失败：${updateError.message}`);
    return;
  }
  
  // 生成历史记录
  const historyItem = {
    hid: Date.now(),
    time: new Date().toLocaleString(),
    type: "领用出库",
    sp_name: stockItem.sp_name,
    model: stockItem.model,
    device: stockItem.device,
    change_num: outNum,
    note: note
  };
  
  const { error: historyError } = await supabase
    .from('oper_history')
    .insert(historyItem);
  
  if (historyError) {
    alert(`记录出库历史失败：${historyError.message}`);
    return;
  }
  
  alert("出库成功！");
  document.getElementById("changeNum").value = "";
  document.getElementById("operRemark").value = "";
  await searchStock();
  
  if (document.getElementById("allStockBox").style.display === "block") {
    await openAllStockTable();
  }
}

// ================= 历史记录模块 =================
async function renderHistory() {
  const { data: hisList, error } = await supabase
    .from('oper_history')
    .select('*')
    .order('time', { ascending: false });
  
  if (error) {
    alert(`获取历史记录失败：${error.message}`);
    return;
  }
  
  let tb = document.getElementById("historyTable");
  tb.innerHTML = "";
  
  hisList.forEach(h => {
    let tr = document.createElement("tr");
    let numDisplay = h.type.includes("入库") || h.type.includes("录入") ? `+${h.change_num}` : `-${h.change_num}`;
    
    tr.innerHTML = `
      <td><input type="checkbox" class="check-item rowCheckHis" value="${h.hid}"></td>
      <td>${h.hid}</td>
      <td>${h.time}</td>
      <td>${h.type}</td>
      <td>${h.sp_name}</td>
      <td>${h.model || '-'}</td>
      <td>${h.device}</td>
      <td>${numDisplay}</td>
      <td><button class="btn-del btn-sm" onclick="deleteHistory(${h.hid})">删除</button></td>
    `;
    tb.appendChild(tr);
  });
}

function checkAllHistory() {
  let allCheck = document.getElementById("checkAllHis").checked;
  let checks = document.querySelectorAll(".rowCheckHis");
  checks.forEach(c => c.checked = allCheck);
}

async function batchDeleteHistory() {
  let checks = document.querySelectorAll(".rowCheckHis:checked");
  if (checks.length === 0) {
    alert("请先勾选要删除的记录");
    return;
  }
  if (!confirm(`确定批量删除选中 ${checks.length} 条历史记录？`)) return;
  
  let delIds = [];
  checks.forEach(c => delIds.push(parseInt(c.value)));
  
  const { error } = await supabase
    .from('oper_history')
    .delete()
    .in('hid', delIds);
  
  if (error) {
    alert(`删除失败：${error.message}`);
    return;
  }
  
  alert("批量删除成功！");
  document.getElementById("checkAllHis").checked = false;
  await renderHistory();
}

async function deleteHistory(hid) {
  if (!confirm("确定要删除此条记录吗？")) return;
  
  const { error } = await supabase
    .from('oper_history')
    .delete()
    .eq('hid', hid);
  
  if (error) {
    alert(`删除失败：${error.message}`);
    return;
  }
  
  await renderHistory();
}

// ================= 导出 Excel =================
async function exportStockExcel() {
  const { data: stockData, error } = await supabase.from('spare_stock').select('*');
  
  if (error || !stockData || stockData.length === 0) {
    alert("暂无数据");
    return;
  }
  
  let exportData = stockData.map(item => ({
    ID: item.id,
    仓库分区: item.ware_area,
    所属设备: item.device,
    备件名称: item.sp_name,
    型号: item.model,
    库存: item.num,
    预警数: item.low_warn,
    存放位置: item.position
  }));
  
  let ws = XLSX.utils.json_to_sheet(exportData);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "备件库存总表");
  XLSX.writeFile(wb, "备件库存总表.xlsx");
}

async function exportHistoryExcel() {
  const { data: historyData, error } = await supabase.from('oper_history').select('*');
  
  if (error || !historyData || historyData.length === 0) {
    alert("暂无记录");
    return;
  }
  
  let exportData = historyData.map(item => ({
    流水编号: item.hid,
    操作时间: item.time,
    操作类型: item.type,
    备件名称: item.sp_name,
    型号: item.model,
    所属设备: item.device,
    变动数量: (item.type.includes("入库") || item.type.includes("录入")) ? `+${item.change_num}` : `-${item.change_num}`,
    操作备注: item.note
  }));
  
  let ws = XLSX.utils.json_to_sheet(exportData);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "出入库历史记录");
  XLSX.writeFile(wb, "出入库历史记录.xlsx");
}

// ================= 基础数据管理（仓库分区） =================
async function getAreaList() {
  const { data, error } = await supabase.from('ware_areas').select('*').order('id');
  return error ? [] : data.map(item => item.area_name);
}

async function saveAreaList(newAreas) {
  // 先清空原有数据
  await supabase.from('ware_areas').delete();
  // 插入新数据
  for (const area of newAreas) {
    await supabase.from('ware_areas').insert({ area_name: area });
  }
  await renderAreaSelect();
  await renderAreaTags();
}

async function renderAreaSelect() {
  let list = await getAreaList();
  let sel = document.getElementById("wareArea");
  sel.innerHTML = `<option value="">选择仓库分区</option>`;
  list.forEach(item => {
    sel.innerHTML += `<option value="${item}">${item}</option>`;
  });
}

async function renderAreaTags() {
  let list = await getAreaList();
  let box = document.getElementById("areaTagList");
  box.innerHTML = "";
  
  list.forEach((item, idx) => {
    let span = document.createElement("span");
    span.className = "tag-item";
    span.innerHTML = `${item} <button class="btn-sm btn-edit-text" onclick="editArea(${idx}, '${item}')">改</button> <button class="btn-sm btn-del" onclick="delArea(${idx})">删</button>`;
    box.appendChild(span);
  });
}

async function addWareArea() {
  let val = document.getElementById("newArea").value.trim();
  if (!val) return;
  
  let arr = await getAreaList();
  if (!arr.includes(val)) {
    arr.push(val);
    await saveAreaList(arr);
  }
  
  document.getElementById("newArea").value = "";
}

async function editArea(idx, oldName) {
  let newName = prompt("修改仓库分区名称", oldName);
  if (newName === null || newName.trim() === "" || newName === oldName) return;
  
  let arr = await getAreaList();
  arr[idx] = newName.trim();
  await saveAreaList(arr);
  
  // 同步更新库存表中的分区名称
  const { error } = await supabase
    .from('spare_stock')
    .update({ ware_area: newName.trim() })
    .eq('ware_area', oldName);
  
  if (error) {
    alert(`同步更新库存分区失败：${error.message}`);
  }
}

async function delArea(idx) {
  if (!confirm("确定删除该仓库分区？")) return;
  
  let arr = await getAreaList();
  arr.splice(idx, 1);
  await saveAreaList(arr);
}

// ================= 备件录入与总表 =================
function toggleFold() {
  let box = document.getElementById("inputFold");
  box.classList.toggle("fold-close");
  box.classList.toggle("fold-open");
}

function toggleBaseFold() {
  let box = document.getElementById("baseFold");
  box.classList.toggle("fold-close");
  box.classList.toggle("fold-open");
}

async function addStock() {
  let area = document.getElementById("wareArea").value;
  let name = document.getElementById("spName").value.trim();
  let model = document.getElementById("spModel").value.trim();
  let device = document.getElementById("deviceName").value.trim();
  let num = parseInt(document.getElementById("spNum").value) || 0;
  let warn = parseInt(document.getElementById("lowWarn").value) || 5;
  let pos = document.getElementById("position").value.trim();
  
  if (!name || !device) {
    alert("请填写备件名称与所属设备！");
    return;
  }
  
  let newId = name + "_" + model;
  
  // 检查是否已存在该备件
  const { data: existing } = await supabase
    .from('spare_stock')
    .select('id')
    .eq('id', newId)
    .single();
  
  let error;
  if (existing) {
    // 已存在，更新库存
    const { data: current } = await supabase
      .from('spare_stock')
      .select('num')
      .eq('id', newId)
      .single();
    
    const newNum = current.num + num;
    ({ error } = await supabase
      .from('spare_stock')
      .update({ 
        ware_area: area, 
        num: newNum, 
        low_warn: warn, 
        position: pos 
      })
      .eq('id', newId));
  } else {
    // 新增备件
    ({ error } = await supabase
      .from('spare_stock')
      .insert({
        id: newId,
        ware_area: area,
        device: device,
        sp_name: name,
        model: model,
        num: num,
        low_warn: warn,
        position: pos
      }));
  }
  
  if (error) {
    alert(`入库失败：${error.message}`);
    return;
  }
  
  // 生成初始入库记录
  const historyItem = {
    hid: Date.now(),
    time: new Date().toLocaleString(),
    type: "初始录入",
    sp_name: name,
    model: model,
    device: device,
    change_num: num,
    note: "新建备件初始入库"
  };
  
  await supabase.from('oper_history').insert(historyItem);
  
  alert("新建备件入库成功！");
  document.querySelectorAll("#inputFold input,#inputFold select").forEach(i => i.value = "");
}

async function importExcelData() {
  let file = document.getElementById("importFile").files[0];
  if (!file) return;
  
  let reader = new FileReader();
  reader.onload = async function(e) {
    try {
      let data = new Uint8Array(e.target.result);
      let workbook = XLSX.read(data, { type: "array" });
      let sheet = workbook.Sheets[workbook.SheetNames[0]];
      let arr = XLSX.utils.sheet_to_json(sheet);
      
      let importCount = 0;
      for (const row of arr) {
        let name = row.备件名称 || "";
        let model = row.型号 || "";
        if (!name) continue;
        
        let newId = name + "_" + model;
        let area = row.仓库分区 || "";
        let device = row.所属设备 || "";
        let num = parseInt(row.数量) || 0;
        let warn = parseInt(row.预警数) || 5;
        let pos = row.存放位置 || "";
        
        // 检查是否已存在
        const { data: existing } = await supabase
          .from('spare_stock')
          .select('id, num')
          .eq('id', newId)
          .single();
        
        if (existing) {
          // 更新库存
          const newNum = existing.num + num;
          await supabase
            .from('spare_stock')
            .update({ 
              ware_area: area, 
              device: device, 
              num: newNum, 
              low_warn: warn, 
              position: pos 
            })
            .eq('id', newId);
        } else {
          // 新增
          await supabase
            .from('spare_stock')
            .insert({
              id: newId,
              ware_area: area,
              device: device,
              sp_name: name,
              model: model,
              num: num,
              low_warn: warn,
              position: pos
            });
        }
        importCount++;
      }
      
      // 生成批量导入历史记录
      if (importCount > 0) {
        const historyItem = {
          hid: Date.now(),
          time: new Date().toLocaleString(),
          type: "批量导入",
          sp_name: `共${importCount}种物料`,
          model: "-",
          device: "-",
          change_num: importCount,
          note: `从Excel导入${importCount}条数据`
        };
        await supabase.from('oper_history').insert(historyItem);
      }
      
      alert(`成功批量导入 ${importCount} 条备件数据，已自动合并重复库存`);
      await renderHistory();
    } catch (err) {
      alert(`导入失败：${err.message}`);
    }
  };
  reader.readAsArrayBuffer(file);
}

async function openAllStockTable() {
  document.getElementById("allStockBox").style.display = "block";
  
  const { data: allStock, error } = await supabase
    .from('spare_stock')
    .select('*');
  
  if (error) {
    alert(`获取库存失败：${error.message}`);
    return;
  }
  
  let tb = document.getElementById("allStockTableBody");
  tb.innerHTML = "";
  
  allStock.forEach(item => {
    let tr = document.createElement("tr");
    if (item.num <= item.low_warn) tr.className = "warn-text";
    
    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.ware_area}</td>
      <td>${item.device}</td>
      <td>${item.sp_name}</td>
      <td>${item.model}</td>
      <td>${item.num}</td>
      <td>${item.low_warn}</td>
      <td>${item.position}</td>
      <td><button class="btn-edit-text btn-sm" onclick="openEditModal('${item.id}')">修改</button></td>
    `;
    tb.appendChild(tr);
  });
}

function hideAllStockTable() {
  document.getElementById("allStockBox").style.display = "none";
}

// ================= 弹窗与编辑 =================
async function openEditModal(id) {
  const { data: [item], error } = await supabase
    .from('spare_stock')
    .select('*')
    .eq('id', id)
    .single();
  
  if (error || !item) return;
  
  document.getElementById("modalEditId").value = id;
  document.getElementById("modalWareArea").value = item.ware_area || "";
  document.getElementById("modalDevice").value = item.device || "";
  document.getElementById("modalSpName").value = item.sp_name || "";
  document.getElementById("modalModel").value = item.model || "";
  document.getElementById("modalNum").value = item.num || 0;
  document.getElementById("modalWarn").value = item.low_warn || 0;
  document.getElementById("modalPos").value = item.position || "";
  
  document.getElementById("editModal").style.display = "block";
}

function closeEditModal() {
  document.getElementById("editModal").style.display = "none";
}

async function saveEditInfo() {
  let id = document.getElementById("modalEditId").value;
  let wareArea = document.getElementById("modalWareArea").value.trim();
  let device = document.getElementById("modalDevice").value.trim();
  let spName = document.getElementById("modalSpName").value.trim();
  let model = document.getElementById("modalModel").value.trim();
  let num = parseInt(document.getElementById("modalNum").value) || 0;
  let warn = parseInt(document.getElementById("modalWarn").value) || 0;
  let pos = document.getElementById("modalPos").value.trim();
  
  if (!spName || !device) {
    alert("备件名称和所属设备不能为空");
    return;
  }
  
  // 更新备件信息
  const { error } = await supabase
    .from('spare_stock')
    .update({
      ware_area: wareArea,
      device: device,
      sp_name: spName,
      model: model,
      num: num,
      low_warn: warn,
      position: pos
    })
    .eq('id', id);
  
  if (error) {
    alert(`修改失败：${error.message}`);
    return;
  }
  
  closeEditModal();
  await searchStock();
  
  if (document.getElementById("allStockBox").style.display === "block") {
    await openAllStockTable();
  }
  
  alert("信息修改保存成功");
}
