<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>设备备件库存管理系统 - 云同步版</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, "微软雅黑", "Segoe UI", sans-serif}
body{background:#f0f2f5;padding:12px}
.container{max-width:1400px;margin:0 auto;background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.05)}
h2{text-align:center;color:#1e466e;margin-bottom:20px;font-weight:600;font-size:1.4rem}
.sync-status{text-align:center;font-size:12px;margin-bottom:12px;color:#2c7da0}
.sync-status.online{color:#27ae60}
.sync-status.offline{color:#e74c3c}
.box{margin-bottom:20px;padding:14px;border:1px solid #e9ecef;border-radius:14px;background:#fefefe}
.title{font-size:15px;font-weight:bold;margin-bottom:12px;color:#2c7da0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.fold-btn{cursor:pointer;color:#2c7da0;font-size:12px;background:#eef2f6;padding:4px 10px;border-radius:20px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;align-items:center}
input,select,textarea{flex:1;min-width:140px;padding:10px 12px;border:1px solid #cfdee9;border-radius:10px;outline:none;font-size:14px}
input:focus,select:focus,textarea:focus{border-color:#3498db;box-shadow:0 0 0 2px rgba(52,152,219,0.2)}
textarea{resize:none;height:60px}
button{padding:8px 14px;border:none;border-radius:10px;cursor:pointer;color:#fff;font-size:13px;font-weight:500;transition:all 0.2s;touch-action:manipulation}
button:active{transform:scale(0.97)}
.btn-add{background:#2c6e2f}
.btn-add:hover{background:#1e5621}
.btn-out{background:#c44536}
.btn-out:hover{background:#a33426}
.btn-search{background:#2c7da0}
.btn-export{background:#6f42c1}
.btn-del{background:#c0392b}
.btn-reset{background:#e67e22}
.btn-his{background:#8e44ad}
.btn-edit-text{background:#5d6d7e}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:20px}
.tag-item{display:inline-flex;align-items:center;gap:6px;background:#f1f5f9;padding:4px 10px;border-radius:24px;margin:4px 6px 4px 0;font-size:12px;flex-wrap:wrap}
.tag-item button{margin-left:4px;padding:2px 6px;font-size:10px}
table{width:100%;border-collapse:collapse;margin-top:10px;border-radius:12px;overflow-x:auto;display:block}
@media (min-width:768px){table{display:table}}
th,td{border:1px solid #e9edf2;padding:8px 6px;text-align:center;font-size:12px}
th{background:#f8fafc;font-weight:600;color:#1e466e}
tr{cursor:pointer}
tr:hover{background:#fef9e6}
.warn-red{color:#e74c3c !important;font-weight:600}
.tab{display:none}
.tab.active{display:block}
.tab-btn{margin:0 4px;padding:6px 16px;background:#e9ecef;border:none;border-radius:30px;font-weight:500;cursor:pointer;font-size:13px}
.tab-btn.active{background:#2c7da0;color:#fff}
.fold-content{overflow:hidden;transition:all 0.25s ease}
.fold-close{max-height:0;padding:0;margin:0}
.fold-open{max-height:800px;padding-top:6px}
.check-item{width:16px;height:16px;cursor:pointer;accent-color:#2c7da0}
.loading{text-align:center;padding:20px;color:#666}
.history-operations{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.scrollable{overflow-x:auto}
@media (max-width:640px){
  .container{padding:12px}
  .row{gap:8px}
  input,select,textarea{padding:8px 10px;font-size:13px}
  button{padding:6px 12px;font-size:12px}
  th,td{padding:6px 4px;font-size:11px}
}
</style>
</head>
<body>
<div class="container">
    <h2>📦 设备备件库存管理系统 <span style="font-size:12px">☁️ 云同步版</span></h2>
    <div id="syncStatus" class="sync-status">🔄 正在连接云端...</div>
    <div style="text-align:center;margin-bottom:16px">
        <button class="tab-btn active" onclick="switchTab(0)">📋 库存管理</button>
        <button class="tab-btn" onclick="switchTab(1)">📜 出入库历史</button>
    </div>

    <!-- 库存管理Tab -->
    <div class="tab active" id="tab0">
        <div class="box">
            <div class="title">🔍 库存精准查询 <span style="font-size:11px;color:#e67e22;">(空查询时显示低于预警的物料)</span></div>
            <div class="row">
                <input type="text" id="searchDevice" placeholder="所属设备查询">
                <input type="text" id="searchSp" placeholder="备件名/型号搜索">
                <button class="btn-search" onclick="searchStock()">🔎 查询</button>
                <button class="btn-reset" onclick="resetSearch()">🔄 重置</button>
                <button class="btn-del btn-sm" onclick="batchDelete()">🗑️ 批量删除</button>
            </div>
        </div>

        <div class="box">
            <div class="title">📋 筛选结果清单 <span style="font-size:11px;color:#e74c3c;">红色=低于预警</span></div>
            <div class="scrollable">
                <table id="resultTable">
                    <thead>
                        <tr><th style="width:32px"><input type="checkbox" id="checkAll" onclick="checkAllItem()"></th>
                            <th>ID</th><th>仓库</th><th>所属设备</th><th>备件名</th><th>型号</th>
                            <th>库存</th><th>预警</th><th>位置</th>
                        </tr>
                    </thead>
                    <tbody id="stockTable"><tr><td colspan="9" style="text-align:center">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="box">
            <div class="title">📥 备件入库 / 领用出库</div>
            <div class="row">
                <input type="text" id="editId" placeholder="备件ID(点击表格行自动填充)" readonly>
                <input type="number" id="changeNum" placeholder="操作数量" min="1">
                <textarea id="operRemark" placeholder="本次操作备注 (必填)"></textarea>
            </div>
            <div class="row">
                <button class="btn-add" onclick="stockIn()">📦 增补入库</button>
                <button class="btn-out" onclick="stockOut()">📤 领用出库</button>
            </div>
            <div style="font-size:11px;color:#6c757d;margin-top:6px">💡 提示：点击下方任意数据行自动选中备件ID</div>
        </div>

        <div class="box">
            <div class="title">🗂️ 库存总表</div>
            <div class="row">
                <button class="btn-search" onclick="toggleAllStockTable()">📊 显示/隐藏总表</button>
                <button class="btn-export" onclick="exportStockExcel()">📎 导出全部库存</button>
            </div>
            <div id="allStockBox" style="display:none;margin-top:12px">
                <div class="scrollable">
                    <table>
                        <thead><tr><th>ID</th><th>仓库</th><th>设备</th><th>备件名</th><th>型号</th><th>库存</th><th>预警</th><th>位置</th><th>操作</th></tr></thead>
                        <tbody id="allStockTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="box">
            <div class="title">➕ 备件信息录入 <span class="fold-btn" onclick="toggleFold()">展开/折叠</span></div>
            <div class="fold-content fold-close" id="inputFold">
                <div class="row"><select id="wareArea"></select><input type="text" id="spName" placeholder="备件名称"><input type="text" id="spModel" placeholder="备件型号"></div>
                <div class="row"><input type="text" id="deviceName" placeholder="所属设备"><input type="number" id="spNum" placeholder="初始库存" min="0"><input type="number" id="lowWarn" placeholder="预警数量" min="0" value="5"><input type="text" id="position" placeholder="存放位置"></div>
                <div class="row"><button class="btn-add" onclick="addStock()">✨ 新建备件入库</button></div>
                <div class="row"><input type="file" id="importFile" accept=".xlsx,.xls" onchange="importExcelData()"><button class="btn-his btn-sm" onclick="alert('导入模板需包含：仓库分区,备件名称,型号,所属设备,数量,预警数,存放位置')">📌 模板说明</button></div>
            </div>
        </div>

        <div class="box">
            <div class="title">⚙️ 仓库分区管理 <span class="fold-btn" onclick="toggleBaseFold()">展开/折叠</span></div>
            <div class="fold-content fold-close" id="baseFold">
                <div class="row"><input type="text" id="newArea" placeholder="新增仓库分区"><button class="btn-edit-text" onclick="addWareArea()">➕ 添加分区</button></div>
                <div class="row"><span>📌 现有分区：</span><div id="areaTagList"></div></div>
            </div>
        </div>
    </div>

    <!-- 历史记录Tab -->
    <div class="tab" id="tab1">
        <div class="box">
            <div class="title">📜 出入库流水记录</div>
            <div class="history-operations">
                <div>
                    <button class="btn-his btn-sm" onclick="exportHistoryExcel()">📎 导出历史</button>
                    <button class="btn-del btn-sm" onclick="batchDeleteHistory()">🗑️ 批量删除</button>
                </div>
                <span style="font-size:12px;">✅ 勾选后可批量删除</span>
            </div>
            <div class="scrollable">
                <table id="historyTableMain">
                    <thead>
                        <tr><th style="width:32px"><input type="checkbox" id="checkAllHistory" onclick="toggleCheckAllHistory()"></th>
                            <th>流水号</th><th>时间</th><th>类型</th><th>备件名</th><th>型号</th><th>设备</th><th>变动</th><th>备注</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"><tr><td colspan="10">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="editModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:20px;box-shadow:0 20px 35px rgba(0,0,0,0.2);z-index:1000;width:90%;max-width:450px">
    <h3 style="margin-bottom:14px">✏️ 修改备件信息</h3>
    <input type="hidden" id="modalEditId">
    <div class="row"><input type="text" id="modalWareArea" placeholder="仓库分区"><input type="text" id="modalDevice" placeholder="所属设备"></div>
    <div class="row"><input type="text" id="modalSpName" placeholder="备件名称"><input type="text" id="modalModel" placeholder="型号"></div>
    <div class="row"><input type="number" id="modalNum" placeholder="库存" min="0"><input type="number" id="modalWarn" placeholder="预警" min="0"></div>
    <div class="row"><input type="text" id="modalPos" placeholder="存放位置"></div>
    <div class="row" style="justify-content:center;gap:12px;margin-top:16px">
        <button class="btn-add" onclick="saveEditInfo()">✅ 保存</button>
        <button class="btn-reset" onclick="closeEditModal()">❌ 取消</button>
    </div>
</div>

<script>
// Supabase 配置
const SUPABASE_URL = 'https://noffptamoriqklsrfhdq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vZmZwdGFtb3JpcWtsc3JmaGRxIiwicm9lIjoiYW5vbiIsImlhdCI6MTc4MTQyNzA0MywiZXhwIjoyMDk3MDAzMDQzfQ.k6icC9TZq82WdZ3aFrdH3ZLYUIQ4VJ1ij2_C2AStCJM';

let supabase;
let currentFilterResult = [];
let allStockData = [];

// 初始化连接
async function initSupabase() {
    try {
        const { createClient } = supabaseJs;
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 测试连接
        const { data, error } = await supabase.from('spare_stock').select('count', { count: 'exact', head: true });
        if (error) throw error;
        document.getElementById('syncStatus').innerHTML = '✅ 云端已连接，数据实时同步';
        document.getElementById('syncStatus').className = 'sync-status online';
        
        // 设置实时订阅
        setupRealtimeSubscriptions();
        
        // 加载数据
        await loadAllData();
    } catch (err) {
        console.error('Supabase连接失败:', err);
        document.getElementById('syncStatus').innerHTML = '⚠️ 离线模式，数据保存在本地';
        document.getElementById('syncStatus').className = 'sync-status offline';
        // 降级到localStorage
        loadLocalData();
    }
}

// 实时订阅
function setupRealtimeSubscriptions() {
    // 订阅库存表变化
    supabase.channel('stock_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'spare_stock' }, (payload) => {
            console.log('库存变化:', payload);
            loadAllData();
        })
        .subscribe();
    
    supabase.channel('history_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'spare_history' }, () => {
            if (document.getElementById('tab1').classList.contains('active')) {
                loadHistoryData();
            }
        })
        .subscribe();
    
    supabase.channel('area_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'ware_areas' }, () => {
            loadAreas();
        })
        .subscribe();
}

// 加载所有数据
async function loadAllData() {
    await loadStockData();
    await loadAreas();
    if (document.getElementById('tab1').classList.contains('active')) {
        await loadHistoryData();
    }
}

// 加载库存数据
async function loadStockData() {
    try {
        const { data, error } = await supabase.from('spare_stock').select('*').order('sp_name');
        if (error) throw error;
        allStockData = data || [];
        // 同步到localStorage作为备份
        localStorage.setItem('spare_stock_data_backup', JSON.stringify(allStockData));
        searchStock(); // 刷新当前视图
        if (document.getElementById('allStockBox').style.display === 'block') {
            renderAllStockTable();
        }
    } catch (err) {
        console.error('加载库存失败:', err);
        loadLocalData();
    }
}

// 加载仓库分区
async function loadAreas() {
    try {
        const { data, error } = await supabase.from('ware_areas').select('*').order('sort_order');
        if (error) throw error;
        const areas = data.map(a => a.name);
        localStorage.setItem('ware_area_list_backup', JSON.stringify(areas));
        renderAreaSelect(areas);
        renderAreaTags(areas);
    } catch (err) {
        console.error('加载分区失败:', err);
        const localAreas = JSON.parse(localStorage.getItem('ware_area_list_backup') || '["A区货架","B区货架","C区耗材区","备品专库区","室外堆放区"]');
        renderAreaSelect(localAreas);
        renderAreaTags(localAreas);
    }
}

// 加载历史数据
async function loadHistoryData() {
    try {
        const { data, error } = await supabase.from('spare_history').select('*').order('hid', { ascending: false }).limit(500);
        if (error) throw error;
        renderHistoryTable(data || []);
    } catch (err) {
        console.error('加载历史失败:', err);
        const localHis = JSON.parse(localStorage.getItem('spare_history_backup') || '[]');
        renderHistoryTable(localHis);
    }
}

// 本地降级数据
function loadLocalData() {
    allStockData = JSON.parse(localStorage.getItem('spare_stock_data_backup') || '[]');
    if (allStockData.length === 0) {
        allStockData = [
            {id:"轴承_6204",ware_area:"A区货架",device:"数控机床",sp_name:"轴承",model:"6204",num:3,low_warn:5,position:"A-01"},
            {id:"皮带_XPA",ware_area:"B区货架",device:"空压机",sp_name:"三角带",model:"XPA1380",num:12,low_warn:6,position:"B-03"}
        ];
    }
    searchStock();
}

// 通用匹配函数
function universalMatch(fieldValue, keyword) {
    if (!keyword) return true;
    return String(fieldValue).toLowerCase().includes(String(keyword).toLowerCase());
}

// 搜索库存
function searchStock() {
    let deviceKw = document.getElementById("searchDevice").value.trim();
    let spKw = document.getElementById("searchSp").value.trim();
    
    let filtered;
    if (deviceKw === "" && spKw === "") {
        filtered = allStockData.filter(item => item.num <= item.low_warn);
    } else {
        filtered = allStockData.filter(item => {
            let matchDev = deviceKw === "" ? true : universalMatch(item.device, deviceKw);
            let matchSp = spKw === "" ? true : (universalMatch(item.sp_name, spKw) || universalMatch(item.model, spKw));
            return matchDev && matchSp;
        });
    }
    currentFilterResult = filtered;
    renderStockTable(filtered);
}

// 渲染库存表格
function renderStockTable(list) {
    let tbody = document.getElementById("stockTable");
    if (!tbody) return;
    if (!list || list.length === 0) {
        tbody.innerHTML = "<tr><td colspan='9' style='text-align:center'>暂无数据</td></tr>";
        return;
    }
    tbody.innerHTML = "";
    list.forEach(item => {
        let tr = document.createElement("tr");
        let isWarn = item.num <= item.low_warn;
        tr.innerHTML = `
            <td><input type="checkbox" class="check-item rowCheck" value="${escapeHtml(item.id)}"></td>
            <td>${escapeHtml(item.id)}</td>
            <td>${escapeHtml(item.ware_area || item.wareArea)}</td>
            <td>${escapeHtml(item.device)}</td>
            <td>${escapeHtml(item.sp_name || item.spName)}</td>
            <td>${escapeHtml(item.model || '')}</td>
            <td class="${isWarn ? 'warn-red' : ''}">${item.num}</td>
            <td>${item.low_warn}</td>
            <td>${escapeHtml(item.position || '')}</td>
        `;
        tr.addEventListener("click", (e) => {
            if (e.target.type !== 'checkbox') {
                document.getElementById("editId").value = item.id;
                showToast(`已选中: ${item.sp_name || item.spName}`);
            }
        });
        tbody.appendChild(tr);
    });
    document.getElementById("checkAll").checked = false;
}

// 渲染仓库分区
function renderAreaSelect(areas) {
    let sel = document.getElementById("wareArea");
    if (!sel) return;
    sel.innerHTML = `<option value="">🏷️ 选择仓库分区</option>` + areas.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
}

function renderAreaTags(areas) {
    let box = document.getElementById("areaTagList");
    if (!box) return;
    box.innerHTML = areas.map((item, idx) => `<span class="tag-item">${escapeHtml(item)} <button class="btn-sm btn-edit-text" onclick="editArea(${idx}, '${escapeHtml(item)}')">改</button><button class="btn-sm btn-del" onclick="delArea(${idx}, '${escapeHtml(item)}')">删</button></span>`).join('');
}

// 添加仓库分区
async function addWareArea() {
    let v = document.getElementById("newArea").value.trim();
    if (!v) return;
    try {
        const { error } = await supabase.from('ware_areas').insert({ name: v });
        if (error) throw error;
        document.getElementById("newArea").value = "";
        showToast("分区已添加");
        await loadAreas();
    } catch (err) {
        showToast("添加失败: " + err.message);
    }
}

async function editArea(idx, oldName) {
    let n = prompt("修改分区名", oldName);
    if (n && n.trim() && n !== oldName) {
        try {
            const { error } = await supabase.from('ware_areas').update({ name: n.trim() }).eq('name', oldName);
            if (error) throw error;
            // 同时更新库存表中的仓库分区
            const { error: updateError } = await supabase.from('spare_stock').update({ ware_area: n.trim() }).eq('ware_area', oldName);
            await loadAreas();
            await loadStockData();
            showToast("分区已更新");
        } catch (err) {
            showToast("更新失败: " + err.message);
        }
    }
}

async function delArea(idx, name) {
    if (!confirm(`删除分区 "${name}"？该分区下的备件将不受影响`)) return;
    try {
        const { error } = await supabase.from('ware_areas').delete().eq('name', name);
        if (error) throw error;
        await loadAreas();
        showToast("分区已删除");
    } catch (err) {
        showToast("删除失败: " + err.message);
    }
}

// 入库操作
async function stockIn() {
    let id = document.getElementById("editId").value;
    let qty = parseInt(document.getElementById("changeNum").value);
    let remark = document.getElementById("operRemark").value.trim();
    if (!id || !qty || qty <= 0 || !remark) {
        alert("请选中备件，填写有效数量及备注！");
        return;
    }
    try {
        // 获取当前库存
        const { data: current, error: fetchError } = await supabase.from('spare_stock').select('num, sp_name, model, device').eq('id', id).single();
        if (fetchError) throw fetchError;
        
        const newNum = current.num + qty;
        const { error: updateError } = await supabase.from('spare_stock').update({ num: newNum }).eq('id', id);
        if (updateError) throw updateError;
        
        // 添加历史记录
        await addHistoryRecord(current.sp_name, current.model, current.device, "增补入库", `+${qty}`, remark);
        
        document.getElementById("changeNum").value = "";
        document.getElementById("operRemark").value = "";
        showToast("入库成功");
        await loadStockData();
    } catch (err) {
        alert("操作失败: " + err.message);
    }
}

async function stockOut() {
    let id = document.getElementById("editId").value;
    let qty = parseInt(document.getElementById("changeNum").value);
    let remark = document.getElementById("operRemark").value.trim();
    if (!id || !qty || qty <= 0 || !remark) {
        alert("请选中备件，填写有效数量及备注！");
        return;
    }
    try {
        const { data: current, error: fetchError } = await supabase.from('spare_stock').select('num, sp_name, model, device').eq('id', id).single();
        if (fetchError) throw fetchError;
        if (current.num < qty) { alert("库存不足！"); return; }
        
        const newNum = current.num - qty;
        const { error: updateError } = await supabase.from('spare_stock').update({ num: newNum }).eq('id', id);
        if (updateError) throw updateError;
        
        await addHistoryRecord(current.sp_name, current.model, current.device, "领用出库", `-${qty}`, remark);
        
        document.getElementById("changeNum").value = "";
        document.getElementById("operRemark").value = "";
        showToast("出库成功");
        await loadStockData();
    } catch (err) {
        alert("操作失败: " + err.message);
    }
}

// Excel导入
async function importExcelData() {
    let file = document.getElementById("importFile").files[0];
    if (!file) return;
    
    let reader = new FileReader();
    reader.onload = async function(e) {
        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, { type: "array" });
        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        let rows = XLSX.utils.sheet_to_json(sheet);
        
        let importedCount = 0;
        let errors = [];
        
        for (let row of rows) {
            let name = row.备件名称 || "";
            let model = row.型号 || "";
            let device = row.所属设备 || "";
            if (!name || !device) {
                errors.push(`跳过: ${name || '无名'} - 缺少名称或设备`);
                continue;
            }
            
            let newId = name + "_" + model;
            let newItem = {
                id: newId,
                ware_area: row.仓库分区 || "",
                device: device,
                sp_name: name,
                model: model,
                num: parseInt(row.数量) || 0,
                low_warn: parseInt(row.预警数) || 5,
                position: row.存放位置 || ""
            };
            
            try {
                // 检查是否已存在
                const { data: existing } = await supabase.from('spare_stock').select('id').eq('id', newId);
                if (existing && existing.length > 0) {
                    // 更新现有库存
                    const { data: current } = await supabase.from('spare_stock').select('num').eq('id', newId).single();
                    if (current) {
                        await supabase.from('spare_stock').update({ num: current.num + newItem.num }).eq('id', newId);
                    }
                } else {
                    await supabase.from('spare_stock').insert(newItem);
                }
                await addHistoryRecord(name, model, device, "批量导入", `+${newItem.num}`, `Excel批量导入`);
                importedCount++;
            } catch (err) {
                errors.push(`${name}: ${err.message}`);
            }
        }
        
        alert(`批量导入完成！成功 ${importedCount} 条${errors.length ? `，失败 ${errors.length} 条` : ''}`);
        if (errors.length) console.error(errors);
        document.getElementById("importFile").value = "";
        await loadStockData();
    };
    reader.readAsArrayBuffer(file);
}

    let tbody = document.getElementById("historyTable");

        tbody.innerHTML = "<tr><td colspan='10' style='text-align:center'>暂无记录</td></tr>";
        return;
    }
    tbody.innerHTML = "";
    historyData.forEach(rec => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td><input type="checkbox" class="historyCheck" value="${rec.hid}"></td>
            <td>${rec.hid}</td>
            <td>${escapeHtml(rec.time)}</td>
            <td>${escapeHtml(rec.type)}</td>
            <td>${escapeHtml(rec.sp_name)}</td>
            <td>${escapeHtml(rec.model || '-')}</td>
            <td>${escapeHtml(rec.device)}</td>

// 切换Tab
function switchTab(idx) {
    let tabs = document.querySelectorAll(".tab");
    let btns = document.querySelectorAll(".tab-btn");
    for (let i = 0; i < tabs.length; i++) {
        if (i === idx) {
            tabs[i].classList.add("active");
            btns[i].classList.add("active");
        } else {
            tabs[i].classList.remove("active");
            btns[i].classList.remove("active");
        }
    }
    if (idx === 1) {
        loadHistoryData();
    }
}

// 工具函数
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function showToast(msg) {
    let t = document.createElement("div");
    t.innerText = msg;
    t.style.position = "fixed";
    t.style.bottom = "20px";
    t.style.left = "50%";
    t.style.transform = "translateX(-50%)";
    t.style.backgroundColor = "#2c3e50";
    t.style.color = "white";
    t.style.padding = "8px 20px";
    t.style.borderRadius = "40px";
    t.style.zIndex = "9999";
    t.style.fontSize = "13px";
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}
