<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备备件库存管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#f5f7fa;padding:15px}
.container{max-width:1300px;margin:0 auto;background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 10px #eee}
h2{text-align:center;color:#2c3e50;margin-bottom:20px}
.box{margin-bottom:25px;padding:15px;border:1px solid #e8e8e8;border-radius:8px}
.title{font-size:16px;font-weight:bold;margin-bottom:12px;color:#3498db;display:flex;justify-content:space-between;align-items:center}
.fold-btn{cursor:pointer;color:#0066cc;font-size:14px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
input,select,textarea{flex:1;min-width:160px;padding:9px;border:1px solid #ddd;border-radius:5px;outline:none}
textarea{resize:none;height:60px}
button{padding:9px 12px;border:none;border-radius:5px;cursor:pointer;color:#fff;font-size:14px}
.btn-add{background:#27ae60}
.btn-out{background:#e67e22}
.btn-search{background:#3498db}
.btn-export{background:#9b59b6}
.btn-del{background:#e74c3c}
.btn-reset{background:#f39c12}
.btn-his{background:#8e44ad}
.btn-edit-text{background:#6c757d}
.btn-sm{padding:4px 8px;font-size:12px}
.tag-item{display:inline-block;padding:3px 8px;border:1px solid #ccc;border-radius:3px;margin:3px;cursor:pointer}
.tag-item:hover{background:#f0f0f0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #eee;padding:8px;text-align:center;font-size:13px}
th{background:#f0f5ff}
.warn-text{color:#ff0000 !important;font-weight:bold}
.tab{display:none}
.tab.active{display:block}
.tab-btn{margin:0 5px;padding:8px 15px;background:#eee;border:none;border-radius:5px;cursor:pointer}
.tab-btn.active{background:#3498db;color:#fff}
.fold-content{overflow:hidden;transition:all 0.3s ease}
.fold-close{max-height:0}
.fold-open{max-height:800px}
.edit-box{display:flex;gap:8px;align-items:center}
.check-item{width:16px;height:16px;cursor:pointer}
@media(max-width:768px){.row{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <h2>设备备件库存管理系统</h2>
  <div style="text-align:center;margin-bottom:15px">
    <button class="tab-btn active" onclick="switchTab(0)" title="切换到库存管理标签页">库存管理</button>
    <button class="tab-btn" onclick="switchTab(1)" title="切换到出入库历史记录标签页">出入库历史记录</button>
  </div>

  <!-- 库存管理 Tab -->
  <div class="tab active" id="tab0">
    <!-- 库存精准查询 -->
    <div class="box">
      <div class="title">库存精准查询</div>
      <div class="row">
        <input type="text" id="searchDevice" placeholder="所属设备查询" title="输入所属设备名称进行精准查询">
        <input type="text" id="searchSp" placeholder="备件名/型号搜索" title="输入备件名称或型号进行精准查询">
        <button class="btn-search" onclick="searchStock()" title="执行库存精准查询">查询</button>
        <button class="btn-reset" onclick="resetSearch()" title="重置查询条件和结果">重置</button>
        <button class="btn-del btn-sm" onclick="batchDelete()" title="批量删除选中的库存数据">批量删除选中</button>
      </div>
    </div>

    <!-- 筛选结果清单 -->
    <div class="box">
      <div class="title">筛选结果清单 <span style="color:red">红色字体 = 低于预警库存</span></div>
      <table>
        <thead>
          <tr>
            <th>
              <label for="checkAll" style="cursor:pointer">
                <input type="checkbox" class="check-item" id="checkAll" onclick="checkAllItem()" title="全选/取消全选库存数据">全选
              </label>
            </th>
            <th>ID</th>
            <th>仓库分区</th>
            <th>所属设备</th>
            <th>备件名称</th>
            <th>型号</th>
            <th>当前库存</th>
            <th>预警下限</th>
            <th>存放位置</th>
          </tr>
        </thead>
        <tbody id="stockTable">
          <tr class="empty-row"><td colspan="9" style="color:#999">暂无数据，请点击查询</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 备件入库 / 领用出库 -->
    <div class="box">
      <div class="title">备件入库 / 领用出库</div>
      <div class="row">
        <input type="text" id="editId" placeholder="备件ID" readonly title="选中库存行后自动填充备件ID">
        <input type="number" id="changeNum" placeholder="操作数量" min="1" title="输入入库/出库的备件数量">
        <textarea id="operRemark" placeholder="本次操作备注" title="填写本次入库/出库的备注信息"></textarea>
      </div>
      <div class="row">
        <button class="btn-add" onclick="stockIn()" title="将填写的数量增补到选中备件的库存">增补入库</button>
        <button class="btn-out" onclick="stockOut()" title="从选中备件的库存中领用出库填写的数量">领用出库</button>
      </div>
    </div>

    <!-- 库存总表一键查看 -->
    <div class="box">
      <div class="title">库存总表一键查看</div>
      <div class="row">
        <button class="btn-search" onclick="openAllStockTable()" title="显示所有备件的库存总表">显示库存总表</button>
        <button class="btn-del" onclick="hideAllStockTable()" title="隐藏库存总表">隐藏库存总表</button>
        <button class="btn-export" onclick="exportStockExcel()" title="将库存总表导出为Excel文件">导出全部库存总表</button>
      </div>
      <div id="allStockBox" style="display:none;margin-top:15px">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>仓库分区</th>
              <th>所属设备</th>
              <th>备件名</th>
              <th>型号</th>
              <th>库存</th>
              <th>预警值</th>
              <th>存放位置</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="allStockTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 15px #999;z-index:999;width:420px">
      <h3 style="margin-bottom:15px;text-align:center">修改备件信息</h3>
      <input type="hidden" id="modalEditId">
      <div class="row">
        <input type="text" id="modalWareArea" placeholder="仓库分区" title="修改备件的仓库分区">
        <input type="text" id="modalDevice" placeholder="所属设备" title="修改备件的所属设备">
      </div>
      <div class="row">
        <input type="text" id="modalSpName" placeholder="备件名称" title="修改备件的名称">
        <input type="text" id="modalModel" placeholder="备件型号" title="修改备件的型号">
      </div>
      <div class="row">
        <input type="number" id="modalNum" placeholder="库存数量" min="0" title="修改备件的库存数量">
        <input type="number" id="modalWarn" placeholder="预警数量" min="0" title="修改备件的库存预警下限">
      </div>
      <div class="row">
        <input type="text" id="modalPos" placeholder="存放位置" title="修改备件的具体存放位置">
      </div>
      <div class="row" style="justify-content:center;margin-top:15px">
        <button class="btn-add" onclick="saveEditInfo()" title="保存修改后的备件信息">保存修改</button>
        <button class="btn-reset" onclick="closeEditModal()" title="取消修改并关闭弹窗">取消</button>
      </div>
    </div>

    <!-- 备件信息录入 -->
    <div class="box">
      <div class="title"> 备件信息录入 <span class="fold-btn" onclick="toggleFold()" title="展开/折叠备件信息录入区域">点击展开/折叠</span> </div>
      <div class="fold-content fold-close" id="inputFold">
        <div class="row">
          <select id="wareArea" aria-label="仓库分区选择" title="选择备件所属的仓库分区"></select>
          <input type="text" id="spName" placeholder="备件名称" title="输入新备件的名称">
          <input type="text" id="spModel" placeholder="备件型号" title="输入新备件的型号">
        </div>
        <div class="row">
          <input type="text" id="deviceName" placeholder="所属设备名称" title="输入新备件所属的设备名称">
          <input type="number" id="spNum" placeholder="初始库存数量" min="0" title="输入新备件的初始库存数量">
          <input type="number" id="lowWarn" placeholder="最低预警数量" min="0" value="5" title="设置新备件的库存预警下限">
          <input type="text" id="position" placeholder="具体存放位置" title="输入新备件的具体存放位置">
        </div>
        <div class="row">
          <button class="btn-add" onclick="addStock()" title="提交新备件信息并入库">新建备件入库</button>
        </div>
        <div class="row" style="margin-top:10px">
          <input type="file" id="importFile" accept=".xlsx,.xls" onchange="importExcelData()" title="选择Excel文件批量导入备件信息">
          <button class="btn-his" onclick="alert('导入模板字段：仓库分区、备件名称、型号、所属设备、数量、预警数、存放位置')" title="查看Excel导入模板的字段说明">查看导入说明</button>
        </div>
      </div>
    </div>

    <!-- 基础数据管理 -->
    <div class="box">
      <div class="title"> 基础数据管理（新增/修改/删除） <span class="fold-btn" onclick="toggleBaseFold()" title="展开/折叠基础数据管理区域">点击展开/折叠</span> </div>
      <div class="fold-content fold-close" id="baseFold">
        <div class="row edit-box">
          <input type="text" id="newArea" placeholder="新增仓库分区" title="输入要添加的新仓库分区名称">
          <button class="btn-edit-text" onclick="addWareArea()" title="添加新的仓库分区">添加分区</button>
        </div>
        <div class="row">
          <span>现有分区（点击修改/删除）：</span>
          <div id="areaTagList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 出入库历史记录 Tab -->
  <div class="tab" id="tab1">
    <div class="box">
      <div class="title">出入库流水记录</div>
      <div style="text-align:right;margin-bottom:10px">
        <button class="btn-del btn-sm" onclick="batchDeleteHistory()" title="批量删除选中的出入库历史记录">批量删除</button>
        <button class="btn-his" onclick="exportHistoryExcel()" title="将出入库历史记录导出为Excel文件">导出全部历史记录</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>
              <label for="checkAllHis" style="cursor:pointer">
                <input type="checkbox" class="check-item" id="checkAllHis" onclick="checkAllHistory()" title="全选/取消全选历史记录">全选
              </label>
            </th>
            <th>流水编号</th>
            <th>操作时间</th>
            <th>操作类型</th>
            <th>备件名称</th>
            <th>型号</th>
            <th>所属设备</th>
            <th>变动数量</th>
            <th>操作备注</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const HISTORY_KEY = "spare_oper_history";
const AREA_KEY = "ware_area_list";
const STOCK_KEY = "spare_stock_data";

// ================= 初始化与基础逻辑 =================
function initBaseData(){
  if(!localStorage.getItem(AREA_KEY)){
    localStorage.setItem(AREA_KEY,JSON.stringify(["A区货架","B区货架","C区耗材区","备品专库区","室外堆放区"]));
  }
  if(!localStorage.getItem(HISTORY_KEY)){
    localStorage.setItem(HISTORY_KEY,JSON.stringify([]));
  }
  if(!localStorage.getItem(STOCK_KEY)){
    localStorage.setItem(STOCK_KEY,JSON.stringify([]));
  }
  renderAreaSelect();
  renderAreaTags();
}

window.onload=function(){
  initBaseData();
  renderAreaSelect();
  renderAreaTags();
  renderHistory();
}

function switchTab(idx){
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",i===idx));
  document.querySelectorAll(".tab-btn").forEach((el,i)=>el.classList.toggle("active",i===idx));
  if(idx===1) renderHistory();
}

// ================= 仓库分区管理【核心修复：字符串传参加引号】 =================
function renderAreaSelect(){
  const areaSelect = document.getElementById("wareArea");
  const areas = JSON.parse(localStorage.getItem(AREA_KEY) || '[]');
  areaSelect.innerHTML = "";
  areas.forEach(area => {
    const option = document.createElement("option");
    option.value = area;
    option.textContent = area;
    areaSelect.appendChild(option);
  });
}

// 修复：分区名称带空格时，onclick 传参增加单引号包裹，保证函数正常触发
function renderAreaTags(){
  const areaTagList = document.getElementById("areaTagList");
  const areas = JSON.parse(localStorage.getItem(AREA_KEY) || '[]');
  areaTagList.innerHTML = "";
  areas.forEach(area => {
    const tag = document.createElement("span");
    tag.className = "tag-item";
    // 关键修复：参数 '${area}' 增加单引号，解决含空格字符串传参失效问题
    tag.innerHTML = `${area} 
      <span style="color:#e74c3c;cursor:pointer;margin-left:5px" onclick="deleteArea('${area}')">×</span>
      <span style="color:#3498db;cursor:pointer;margin-left:5px" onclick="editArea('${area}')">✎</span>`;
    areaTagList.appendChild(tag);
  });
}

function addWareArea(){
  const newAreaInput = document.getElementById("newArea");
  const newArea = newAreaInput.value.trim();
  if(!newArea){
    alert("请输入仓库分区名称！");
    return;
  }
  const areas = JSON.parse(localStorage.getItem(AREA_KEY) || '[]');
  if(areas.includes(newArea)){
    alert("该分区已存在！");
    newAreaInput.value = "";
    return;
  }
  areas.push(newArea);
  localStorage.setItem(AREA_KEY, JSON.stringify(areas));
  newAreaInput.value = "";
  renderAreaSelect();
  renderAreaTags();
  alert("分区添加成功！");
}

function editArea(oldArea){
  const newArea = prompt("请输入新的分区名称", oldArea);
  if(!newArea || newArea.trim() === "") return;
  const areas = JSON.parse(localStorage.getItem(AREA_KEY) || '[]');
  const index = areas.findIndex(area => area === oldArea);
  if(index === -1) return;
  const trimArea = newArea.trim();
  if(areas.includes(trimArea)){
    alert("新分区名称已存在！");
    return;
  }
  areas[index] = trimArea;
  localStorage.setItem(AREA_KEY, JSON.stringify(areas));
  renderAreaSelect();
  renderAreaTags();
  alert("分区修改成功！");
}

function deleteArea(area){
  if(!confirm(`确定删除分区【${area}】吗？`)) return;
  const areas = JSON.parse(localStorage.getItem(AREA_KEY) || '[]');
  const newAreas = areas.filter(item => item !== area);
  localStorage.setItem(AREA_KEY, JSON.stringify(newAreas));
  renderAreaSelect();
  renderAreaTags();
  alert("分区删除成功！");
}

// ================= 库存管理核心逻辑 =================
function searchStock(){
    let dKey = String(document.getElementById("searchDevice").value || '').trim().toLowerCase();
    let sKey = String(document.getElementById("searchSp").value || '').trim().toLowerCase();
    
    let all = getStockData();
    let res = [];

    if (dKey === '' && sKey === '') {
        res = all.filter(item => item.num <= item.lowWarn);
    } else {
        res = all.filter(item=>{
            let deviceStr = String(item.device || '').toLowerCase();
            let spNameStr = String(item.spName || '').toLowerCase();
            let modelStr = String(item.model || '').toLowerCase();
            
            let matchDev = dKey === '' || deviceStr.includes(dKey);
            let matchSp = sKey === '' || spNameStr.includes(sKey) || modelStr.includes(sKey);
            
            return matchDev && matchSp;
        });
    }
    renderTable(res);
}

function selectRow(id, name, model) {
  document.getElementById("editId").value = id;
}

function renderTable(list){
  let tb = document.getElementById("stockTable");
  tb.innerHTML = "";
  
  if(!list.length) {
    tb.innerHTML = '<tr><td colspan="9" style="color:#999;text-align:center">未查询到符合条件的物料</td></tr>';
    return;
  } 
  
  list.forEach(item=>{
    let tr = document.createElement("tr");
    if(item.num <= item.lowWarn) tr.className = "warn-text"; 
    
    tr.onclick = function(e) {
      if (e.target.type !== 'checkbox') {
        selectRow(item.id, item.spName, item.model);
      }
    };
    
    tr.innerHTML = `
      <td><input type="checkbox" class="check-item rowCheck" value="${item.id}" title="选中该条库存数据"></td>
      <td>${item.id}</td>
      <td>${item.wareArea}</td>
      <td>${item.device}</td>
      <td>${item.spName}</td>
      <td>${item.model}</td>
      <td>${item.num}</td>
      <td>${item.lowWarn}</td>
      <td>${item.position}</td>
    `;
    tb.appendChild(tr);
  });
}

function getStockData(){ let d = localStorage.getItem(STOCK_KEY); return d ? JSON.parse(d) : []; }
function saveStockData(arr){ localStorage.setItem(STOCK_KEY,JSON.stringify(arr)); }
function getHistoryData(){ let d = localStorage.getItem(HISTORY_KEY); return d ? JSON.parse(d) : []; }
function saveHistoryData(arr){ localStorage.setItem(HISTORY_KEY,JSON.stringify(arr)); }

function checkAllItem(){ 
  let allCheck = document.getElementById("checkAll").checked; 
  let checks = document.querySelectorAll(".rowCheck"); 
  checks.forEach(c=>c.checked = allCheck); 
}

function batchDelete(){
  let checks = document.querySelectorAll(".rowCheck:checked");
  if(checks.length === 0){ alert("请先勾选要删除的数据"); return; }
  if(!confirm(`确定批量删除选中 ${checks.length} 条备件？不可恢复`))return;
  let delIds = []; checks.forEach(c=>delIds.push(c.value));
  let list = getStockData(); list = list.filter(item=>!delIds.includes(item.id));
  saveStockData(list); searchStock(); document.getElementById("checkAll").checked = false;
  alert("批量删除完成");
}

function resetSearch(){
  document.getElementById("searchDevice").value="";
  document.getElementById("searchSp").value="";
  document.getElementById("stockTable").innerHTML = '<tr class="empty-row"><td colspan="9" style="color:#999;text-align:center">暂无数据，请点击查询</td></tr>';
  document.getElementById("checkAll").checked = false;
}

// ================= 新建备件入库 & ID生成规则：备件名称-型号 =================
function generateSpId(spName, model) {
  const name = spName.trim().replace(/\s+/g, "").toLowerCase();
  const mod = model.trim().replace(/\s+/g, "").toLowerCase();
  return `${name}-${mod}`;
}

function addStock(){
  const wareArea = document.getElementById("wareArea").value;
  const spName = document.getElementById("spName").value.trim();
  const spModel = document.getElementById("spModel").value.trim();
  const deviceName = document.getElementById("deviceName").value.trim();
  const spNum = parseInt(document.getElementById("spNum").value) || 0;
  const lowWarn = parseInt(document.getElementById("lowWarn").value) || 5;
  const position = document.getElementById("position").value.trim();

  if(!wareArea){
    alert("请选择仓库分区！");
    return;
  }
  if(!spName || !spModel){
    alert("备件名称和型号不能为空！");
    return;
  }
  if(!deviceName){
    alert("所属设备名称不能为空！");
    return;
  }
  if(spNum < 0){
    alert("初始库存不能为负数！");
    return;
  }

  const spId = generateSpId(spName, spModel);
  const stockList = getStockData();
  const isDuplicate = stockList.some(item => item.id === spId);
  if(isDuplicate){
    alert(`该备件【${spName}-${spModel}】已存在！`);
    return;
  }

  const newSpare = {
    id: spId,
    wareArea,
    spName,
    model: spModel,
    device: deviceName,
    num: spNum,
    lowWarn,
    position
  };

  stockList.push(newSpare);
  saveStockData(stockList);

  const hisList = getHistoryData();
  hisList.unshift({
    hid: Date.now(),
    time: new Date().toLocaleString(),
    type: "初始录入",
    spName,
    model: spModel,
    device: deviceName,
    changeNum: spNum,
    note: "新建备件初始入库"
  });
  saveHistoryData(hisList);

  document.getElementById("spName").value = "";
  document.getElementById("spModel").value = "";
  document.getElementById("deviceName").value = "";
  document.getElementById("spNum").value = "";
  document.getElementById("lowWarn").value = "5";
  document.getElementById("position").value = "";

  alert("新建备件入库成功！");
  searchStock();
}

// ================= 入库 / 出库 逻辑 =================
function stockIn(){
  let id = document.getElementById("editId").value;
  let inNum = parseInt(document.getElementById("changeNum").value);
  let note = document.getElementById("operRemark").value.trim();
  if(!id||!inNum||inNum<=0||!note){
    alert("请选中备件、填写有效数量与备注！");
    return;
  }
  
  let list = getStockData();
  let idx = list.findIndex(v=>v.id===id);
  if(idx===-1){alert("未找到备件");return;}
  
  list[idx].num += inNum;
  saveStockData(list);
  
  let his = getHistoryData();
  his.unshift({
    hid: Date.now(),
    time: new Date().toLocaleString(),
    type: "增补入库",
    spName: list[idx].spName,
    model: list[idx].model,
    device: list[idx].device,
    changeNum: inNum,
    note
  });
  saveHistoryData(his);
  
  alert("入库成功！");
  document.getElementById("changeNum").value="";
  document.getElementById("operRemark").value="";
  searchStock();
}

function stockOut(){
  let id = document.getElementById("editId").value;
  let outNum = parseInt(document.getElementById("changeNum").value);
  let note = document.getElementById("operRemark").value.trim();
  if(!id||!outNum||outNum<=0||!note){
    alert("请选中备件、填写有效数量与备注！");
    return;
  }
  
  let list = getStockData();
  let idx = list.findIndex(v=>v.id===id);
  if(idx===-1){alert("未找到备件");return;}
  if(list[idx].num < outNum){alert("库存不足！");return;}
  
  list[idx].num -= outNum;
  saveStockData(list);
  
  let his = getHistoryData();
  his.unshift({
    hid: Date.now(),
    time: new Date().toLocaleString(),
    type: "领用出库",
    spName: list[idx].spName,
    model: list[idx].model,
    device: list[idx].device,
    changeNum: outNum,
    note
  });
  saveHistoryData(his);
  
  alert("出库成功！");
  document.getElementById("changeNum").value="";
  document.getElementById("operRemark").value="";
  searchStock();
  if(document.getElementById("allStockBox").style.display === "block"){
    openAllStockTable();
  }
}

// ================= 历史记录模块【修复单条删除】 =================
function renderHistory(){
  let hisList = getHistoryData();
  let tb = document.getElementById("historyTable");
  tb.innerHTML = "";
  
  hisList.sort((a, b) => new Date(b.time) - new Date(a.time));
  
  hisList.forEach(h=>{
    let tr = document.createElement("tr");
    let numDisplay = h.type.includes("入库") || h.type.includes("录入") ? `+${h.changeNum}` : `-${h.changeNum}`;
    tr.innerHTML = `
      <td><input type="checkbox" class="check-item rowCheckHis" value="${h.hid}" title="选中该条历史记录"></td>
      <td>${h.hid}</td>
      <td>${h.time}</td>
      <td>${h.type}</td>
      <td>${h.spName}</td>
      <td>${h.model || '-'}</td>
      <td>${h.device}</td>
      <td>${numDisplay}</td>
      <td>${h.note}</td>
      <td><button type="button" class="btn-del btn-sm" onclick="deleteHistory(${h.hid})" title="删除该条出入库历史记录">删除</button></td>
    `;
    tb.appendChild(tr);
  });
}

// 增加类型校验，确保数字匹配，修复删除失效
function deleteHistory(hid){
  if(isNaN(hid)){
    alert("参数异常，删除失败");
    return;
  }
  if(!confirm("确定要删除此条记录吗？")) return;
  let his = getHistoryData();
  // 严格匹配数字类型
  let filtered = his.filter(item => Number(item.hid) !== Number(hid));
  saveHistoryData(filtered);
  renderHistory();
  alert("历史记录删除成功！");
}

function checkAllHistory(){
  let allCheck = document.getElementById("checkAllHis").checked;
  let checks = document.querySelectorAll(".rowCheckHis");
  checks.forEach(c=>c.checked = allCheck);
}

function batchDeleteHistory(){
  let checks = document.querySelectorAll(".rowCheckHis:checked");
  if(checks.length === 0){ alert("请先勾选要删除的记录"); return; }
  if(!confirm(`确定批量删除选中 ${checks.length} 条历史记录？`))return;
  
  let delIds = [];
  checks.forEach(c=>delIds.push(Number(c.value)));
  
  let his = getHistoryData();
  his = his.filter(item => !delIds.includes(Number(item.hid)));
  
  saveHistoryData(his);
  renderHistory();
  document.getElementById("checkAllHis").checked = false;
  alert("批量删除成功！");
}

// ================= 库存总表 =================
function openAllStockTable(){
  const allStockBox = document.getElementById("allStockBox");
  const tableBody = document.getElementById("allStockTableBody");
  allStockBox.style.display = "block";
  
  const stockList = getStockData();
  tableBody.innerHTML = "";
  
  if(stockList.length === 0){
    tableBody.innerHTML = '<tr><td colspan="9" style="color:#999;text-align:center">暂无库存数据</td></tr>';
    return;
  }
  
  stockList.forEach(item => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.wareArea}</td>
      <td>${item.device}</td>
      <td>${item.spName}</td>
      <td>${item.model}</td>
      <td>${item.num}</td>
      <td>${item.lowWarn}</td>
      <td>${item.position}</td>
      <td><button class="btn-edit-text btn-sm" onclick="openEditModal('${item.id}')" title="编辑该备件信息">编辑</button></td>
    `;
    tableBody.appendChild(tr);
  });
}

function hideAllStockTable(){
  document.getElementById("allStockBox").style.display = "none";
}

// ================= 编辑弹窗 =================
function openEditModal(id){
  const stockList = getStockData();
  const item = stockList.find(item => item.id === id);
  if(!item) return;
  
  document.getElementById("modalEditId").value = id;
  document.getElementById("modalWareArea").value = item.wareArea;
  document.getElementById("modalDevice").value = item.device;
  document.getElementById("modalSpName").value = item.spName;
  document.getElementById("modalModel").value = item.model;
  document.getElementById("modalNum").value = item.num;
  document.getElementById("modalWarn").value = item.lowWarn;
  document.getElementById("modalPos").value = item.position;
  
  document.getElementById("editModal").style.display = "block";
}

function closeEditModal(){
  document.getElementById("editModal").style.display = "none";
}

function saveEditInfo(){
  const id = document.getElementById("modalEditId").value;
  const wareArea = document.getElementById("modalWareArea").value.trim();
  const device = document.getElementById("modalDevice").value.trim();
  const spName = document.getElementById("modalSpName").value.trim();
  const model = document.getElementById("modalModel").value.trim();
  const num = parseInt(document.getElementById("modalNum").value) || 0;
  const warn = parseInt(document.getElementById("modalWarn").value) || 0;
  const pos = document.getElementById("modalPos").value.trim();
  
  if(!wareArea || !device || !spName || !model){
    alert("必填项不能为空！");
    return;
  }
  
  const stockList = getStockData();
  const idx = stockList.findIndex(item => item.id === id);
  if(idx === -1) return;
  
  stockList[idx] = {
    ...stockList[idx],
    wareArea,
    device,
    spName,
    model,
    num,
    lowWarn: warn,
    position
  };
  
  saveStockData(stockList);
  closeEditModal();
  searchStock();
  if(document.getElementById("allStockBox").style.display === "block"){
    openAllStockTable();
  }
  alert("修改成功！");
}

// ================= 导入/导出Excel =================
function exportStockExcel(){
  let data=getStockData();
  if(data.length===0){alert("暂无数据");return;}
  let exportData = data.map(item => ({
    ID: item.id,
    仓库分区: item.wareArea,
    所属设备: item.device,
    备件名称: item.spName,
    型号: item.model,
    库存: item.num,
    预警下限: item.lowWarn,
    存放位置: item.position
  }));
  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "库存总表");
  XLSX.writeFile(wb, `备件库存表_${new Date().toLocaleDateString()}.xlsx`);
}

function exportHistoryExcel(){
  let data=getHistoryData();
  if(data.length===0){alert("暂无历史记录");return;}
  let exportData = data.map(item => ({
    流水编号: item.hid,
    操作时间: item.time,
    操作类型: item.type,
    备件名称: item.spName,
    型号: item.model || '-',
    所属设备: item.device,
    变动数量: item.changeNum,
    操作备注: item.note || '-'
  }));
  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "出入库历史");
  XLSX.writeFile(wb, `出入库历史_${new Date().toLocaleDateString()}.xlsx`);
}

function importExcelData(){
  const file = document.getElementById("importFile").files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: "array" });
      const wsname = wb.SheetNames[0];
      const ws = wb.Sheets[wsname];
      const json = XLSX.utils.sheet_to_json(ws);
      
      if(json.length === 0){
        alert("Excel文件中无数据！");
        return;
      }
      
      const requiredFields = ["仓库分区", "备件名称", "型号", "所属设备", "数量", "预警数", "存放位置"];
      const firstRow = json[0];
      const hasAllFields = requiredFields.every(field => firstRow.hasOwnProperty(field));
      if(!hasAllFields){
        alert(`Excel模板字段缺失！必填字段：${requiredFields.join("、")}`);
        return;
      }
      
      const stockList = getStockData();
      const hisList = getHistoryData();
      let successCount = 0;
      let failCount = 0;
      
      json.forEach(item => {
        try {
          const wareArea = item["仓库分区"];
          const spName = item["备件名称"].trim();
          const model = item["型号"].trim();
          const device = item["所属设备"].trim();
          const num = parseInt(item["数量"]) || 0;
          const warn = parseInt(item["预警数"]) || 5;
          const position = item["存放位置"].trim();
          
          if(!wareArea || !spName || !model || !device){
            failCount++;
            return;
          }
          
          const spId = generateSpId(spName, model);
          const existingIdx = stockList.findIndex(sp => sp.id === spId);
          
          if(existingIdx !== -1){
            stockList[existingIdx].num += num;
            stockList[existingIdx].lowWarn = warn;
            stockList[existingIdx].position = position;
            stockList[existingIdx].wareArea = wareArea;
          } else {
            stockList.push({
              id: spId,
              wareArea,
              spName,
              model,
              device,
              num,
              lowWarn: warn,
              position
            });
          }
          
          hisList.unshift({
            hid: Date.now() + successCount,
            time: new Date().toLocaleString(),
            type: "Excel导入",
            spName,
            model,
            device,
            changeNum: num,
            note: "Excel批量导入"
          });
          
          successCount++;
        } catch (err) {
          failCount++;
        }
      });
      
      saveStockData(stockList);
      saveHistoryData(hisList);
      document.getElementById("importFile").value = "";
      alert(`导入完成！成功：${successCount} 条，失败：${failCount} 条`);
      searchStock();
    } catch (err) {
      alert(`导入失败：${err.message}`);
    }
  };
  reader.readAsArrayBuffer(file);
}
