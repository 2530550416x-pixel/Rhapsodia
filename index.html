<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>设备备件库存管理系统 - 云同步版</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, "微软雅黑", "Segoe UI", sans-serif}
body{background:#f0f2f5;padding:12px}
.container{max-width:1400px;margin:0 auto;background:#fff;border-radius:16px;padding:16px;box-shadow:0 8px 20px rgba(0,0,0,0.05)}
h2{text-align:center;color:#1e466e;margin-bottom:16px;font-weight:600;font-size:1.3rem}
.sync-status{text-align:center;font-size:12px;margin-bottom:12px;padding:6px;border-radius:20px}
.sync-status.online{background:#d5f5e3;color:#27ae60}
.sync-status.offline{background:#fadbd8;color:#e74c3c}
.sync-status.loading{background:#fef9e7;color:#f39c12}
.box{margin-bottom:16px;padding:12px;border:1px solid #e9ecef;border-radius:12px;background:#fefefe}
.title{font-size:14px;font-weight:bold;margin-bottom:10px;color:#2c7da0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.fold-btn{cursor:pointer;color:#2c7da0;font-size:11px;background:#eef2f6;padding:3px 8px;border-radius:20px}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
input,select,textarea{flex:1;min-width:120px;padding:8px 10px;border:1px solid #cfdee9;border-radius:8px;outline:none;font-size:13px}
input:focus,select:focus,textarea:focus{border-color:#3498db;box-shadow:0 0 0 2px rgba(52,152,219,0.2)}
textarea{resize:none;height:55px}
button{padding:6px 12px;border:none;border-radius:8px;cursor:pointer;color:#fff;font-size:12px;font-weight:500;transition:all 0.2s}
button:active{transform:scale(0.96)}
.btn-add{background:#2c6e2f}
.btn-add:hover{background:#1e5621}
.btn-out{background:#c44536}
.btn-out:hover{background:#a33426}
.btn-search{background:#2c7da0}
.btn-export{background:#6f42c1}
.btn-del{background:#c0392b}
.btn-reset{background:#e67e22}
.btn-his{background:#8e44ad}
.btn-edit-text{background:#5d6d7e}
.btn-sm{padding:3px 8px;font-size:11px;border-radius:16px}
.tag-item{display:inline-flex;align-items:center;gap:5px;background:#f1f5f9;padding:3px 8px;border-radius:20px;margin:3px 5px 3px 0;font-size:11px}
.tag-item button{margin-left:3px;padding:1px 5px;font-size:10px}
.table-wrapper{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{border:1px solid #e9edf2;padding:6px 4px;text-align:center}
th{background:#f8fafc;font-weight:600;color:#1e466e}
tr{cursor:pointer}
tr:hover{background:#fef9e6}
.warn-red{color:#e74c3c !important;font-weight:600}
.tab{display:none}
.tab.active{display:block}
.tab-btn{margin:0 3px;padding:5px 14px;background:#e9ecef;border:none;border-radius:25px;font-weight:500;cursor:pointer;font-size:12px}
.tab-btn.active{background:#2c7da0;color:#fff}
.fold-content{overflow:hidden;transition:all 0.2s}
.fold-close{max-height:0;padding:0;margin:0}
.fold-open{max-height:500px;padding-top:5px}
.check-item{width:14px;height:14px;cursor:pointer;accent-color:#2c7da0}
.loading-text{text-align:center;padding:15px;color:#666;font-size:12px}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:18px;border-radius:16px;box-shadow:0 20px 35px rgba(0,0,0,0.2);z-index:1000;width:90%;max-width:400px}
.modal h3{margin-bottom:12px;font-size:16px}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999}
@media (max-width:640px){
    .container{padding:10px}
    input,select,textarea{padding:6px 8px;font-size:12px}
    button{padding:5px 10px;font-size:11px}
    th,td{padding:4px 3px;font-size:10px}
}
</style>
</head>
<body>
<div class="container">
    <h2>📦 设备备件库存管理系统 <span style="font-size:11px">☁️ 云同步版</span></h2>
    <div id="syncStatus" class="sync-status loading">🔄 正在连接云端...</div>
    <div style="text-align:center;margin-bottom:12px">
        <button class="tab-btn active" data-tab="0">📋 库存管理</button>
        <button class="tab-btn" data-tab="1">📜 出入库历史</button>
    </div>

    <!-- 库存管理Tab -->
    <div class="tab active" id="tab0">
        <div class="box">
            <div class="title">🔍 库存查询 <span style="font-size:10px;color:#e67e22;">(空查询显示低于预警物料)</span></div>
            <div class="row">
                <input type="text" id="searchDevice" placeholder="所属设备">
                <input type="text" id="searchSp" placeholder="备件名/型号">
                <button class="btn-search" id="searchBtn">🔎 查询</button>
                <button class="btn-reset" id="resetSearchBtn">🔄 重置</button>
                <button class="btn-del btn-sm" id="batchDeleteBtn">🗑️ 批量删除</button>
            </div>
        </div>

        <div class="box">
            <div class="title">📋 查询结果 <span style="font-size:10px;color:#e74c3c;">红色=低于预警</span></div>
            <div class="table-wrapper">
                <table id="resultTable">
                    <thead>
                        <tr><th style="width:28px"><input type="checkbox" id="checkAll"></th>
                            <th>ID</th><th>仓库</th><th>设备</th><th>备件名</th><th>型号</th>
                            <th>库存</th><th>预警</th><th>位置</th>
                        </tr>
                    </thead>
                    <tbody id="stockTable"><tr><td colspan="9" style="text-align:center">点击查询按钮加载数据</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="box">
            <div class="title">📥 入库 / 出库</div>
            <div class="row">
                <input type="text" id="editId" placeholder="备件ID(点击行自动填充)" readonly>
                <input type="number" id="changeNum" placeholder="数量" min="1">
                <textarea id="operRemark" placeholder="备注(必填)"></textarea>
            </div>
            <div class="row">
                <button class="btn-add" id="stockInBtn">📦 增补入库</button>
                <button class="btn-out" id="stockOutBtn">📤 领用出库</button>
            </div>
            <div style="font-size:10px;color:#6c757d;margin-top:5px">💡 点击表格行自动选中备件ID</div>
        </div>

        <div class="box">
            <div class="title">🗂️ 库存总表</div>
            <div class="row">
                <button class="btn-search" id="toggleAllStockBtn">📊 显示/隐藏总表</button>
                <button class="btn-export" id="exportStockBtn">📎 导出全部库存</button>
            </div>
            <div id="allStockBox" style="display:none;margin-top:10px">
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>ID</th><th>仓库</th><th>设备</th><th>备件名</th><th>型号</th><th>库存</th><th>预警</th><th>位置</th><th>操作</th></tr></thead>
                        <tbody id="allStockTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="box">
            <div class="title">➕ 新增备件 <span class="fold-btn" id="toggleFoldBtn">展开/折叠</span></div>
            <div class="fold-content fold-close" id="inputFold">
                <div class="row">
                    <select id="wareArea"></select>
                    <input type="text" id="spName" placeholder="备件名称*">
                    <input type="text" id="spModel" placeholder="型号">
                </div>
                <div class="row">
                    <input type="text" id="deviceName" placeholder="所属设备*">
                    <input type="number" id="spNum" placeholder="初始库存" min="0" value="0">
                    <input type="number" id="lowWarn" placeholder="预警数量" min="0" value="5">
                    <input type="text" id="position" placeholder="存放位置">
                </div>
                <div class="row">
                    <button class="btn-add" id="addStockBtn">✨ 新建备件</button>
                </div>
                <div class="row">
                    <input type="file" id="importFile" accept=".xlsx,.xls">
                    <button class="btn-his btn-sm" id="importHintBtn">📌 说明</button>
                </div>
            </div>
        </div>

        <div class="box">
            <div class="title">⚙️ 仓库分区 <span class="fold-btn" id="toggleBaseFoldBtn">展开/折叠</span></div>
            <div class="fold-content fold-close" id="baseFold">
                <div class="row">
                    <input type="text" id="newArea" placeholder="新增分区名称">
                    <button class="btn-edit-text" id="addWareAreaBtn">➕ 添加</button>
                </div>
                <div class="row"><span>📌 现有分区：</span><div id="areaTagList"></div></div>
            </div>
        </div>
    </div>

    <!-- 历史记录Tab -->
    <div class="tab" id="tab1">
        <div class="box">
            <div class="title">📜 出入库流水记录</div>
            <div class="row" style="justify-content:space-between">
                <div>
                    <button class="btn-his btn-sm" id="exportHistoryBtn">📎 导出历史</button>
                    <button class="btn-del btn-sm" id="batchDelHistoryBtn">🗑️ 批量删除</button>
                </div>
                <span style="font-size:11px;">✅ 勾选后可批量删除</span>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width:28px"><input type="checkbox" id="checkAllHistory"></th>
                            <th>流水号</th><th>时间</th><th>类型</th><th>备件名</th><th>型号</th><th>设备</th><th>变动</th><th>备注</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"><tr><td colspan="10" style="text-align:center">暂无记录</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay"></div>
<div class="modal" id="editModal">
    <h3>✏️ 修改备件信息</h3>
    <input type="hidden" id="modalEditId">
    <div class="row"><input type="text" id="modalWareArea" placeholder="仓库分区"></div>
    <div class="row"><input type="text" id="modalDevice" placeholder="所属设备"></div>
    <div class="row"><input type="text" id="modalSpName" placeholder="备件名称"></div>
    <div class="row"><input type="text" id="modalModel" placeholder="型号"></div>
    <div class="row"><input type="number" id="modalNum" placeholder="库存" min="0"></div>
    <div class="row"><input type="number" id="modalWarn" placeholder="预警" min="0"></div>
    <div class="row"><input type="text" id="modalPos" placeholder="存放位置"></div>
    <div class="row" style="justify-content:center;gap:10px;margin-top:12px">
        <button class="btn-add" id="saveEditBtn">✅ 保存</button>
        <button class="btn-reset" id="cancelEditBtn">❌ 取消</button>
    </div>
</div>

<script>
// Supabase 配置
const SUPABASE_URL = 'https://noffptamoriqklsrfhdq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vZmZwdGFtb3JpcWtsc3JmaGRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjcwNDMsImV4cCI6MjA5NzAwMzA0M30.k6icC9TZq82WdZ3aFrdH3ZLYUIQ4VJ1ij2_C2AStCJM';

let supabase = null;
let allStockData = [];
let currentHistoryData = [];

// 初始化
async function init() {
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { error } = await supabase.from('spare_stock').select('count', { count: 'exact', head: true });
        if (error) throw error;
        document.getElementById('syncStatus').innerHTML = '✅ 云端已连接，数据实时同步';
        document.getElementById('syncStatus').className = 'sync-status online';
        await loadAllData();
        await loadHistoryData();
    } catch (err) {
        console.error('Supabase连接失败:', err);
        document.getElementById('syncStatus').innerHTML = '⚠️ 使用本地模式，请检查网络和Supabase配置';
        document.getElementById('syncStatus').className = 'sync-status offline';
        loadLocalDemoData();
    }
    bindEvents();
}

function bindEvents() {
    // 库存管理tab内所有按钮
    document.getElementById('searchBtn').onclick = () => searchStock();
    document.getElementById('resetSearchBtn').onclick = () => resetSearch();
    document.getElementById('batchDeleteBtn').onclick = () => batchDelete();
    document.getElementById('stockInBtn').onclick = () => stockIn();
    document.getElementById('stockOutBtn').onclick = () => stockOut();
    document.getElementById('toggleAllStockBtn').onclick = () => toggleAllStockTable();
    document.getElementById('exportStockBtn').onclick = () => exportStockExcel();
    document.getElementById('addStockBtn').onclick = () => addStock();
    document.getElementById('toggleFoldBtn').onclick = () => toggleFold();
    document.getElementById('toggleBaseFoldBtn').onclick = () => toggleBaseFold();
    document.getElementById('addWareAreaBtn').onclick = () => addWareArea();
    document.getElementById('importHintBtn').onclick = () => alert('导入列：仓库分区,备件名称,型号,所属设备,数量,预警数,存放位置');
    document.getElementById('importFile').onchange = (e) => importExcelData(e);
    
    // 历史tab按钮 (事件委托也可以，但直接绑定)
    const exportHistory = document.getElementById('exportHistoryBtn');
    if(exportHistory) exportHistory.onclick = () => exportHistoryExcel();
    const batchDelHistory = document.getElementById('batchDelHistoryBtn');
    if(batchDelHistory) batchDelHistory.onclick = () => batchDeleteHistory();
    
    // 全选
    document.getElementById('checkAll').onclick = () => checkAllItem();
    document.getElementById('checkAllHistory').onclick = () => toggleCheckAllHistory();
    
    // 模态框按钮
    document.getElementById('saveEditBtn').onclick = () => saveEditInfo();
    document.getElementById('cancelEditBtn').onclick = () => closeEditModal();
    document.getElementById('modalOverlay').onclick = () => closeEditModal();
    
    // tab切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = (e) => {
            const idx = parseInt(btn.getAttribute('data-tab'));
            switchTab(idx);
        };
    });
}

function loadLocalDemoData() {
    allStockData = [
        {id:"轴承_6204", ware_area:"A区货架", device:"数控机床", sp_name:"轴承", model:"6204", num:3, low_warn:5, position:"A-01"},
        {id:"皮带_XPA", ware_area:"B区货架", device:"空压机", sp_name:"三角带", model:"XPA1380", num:12, low_warn:6, position:"B-03"},
        {id:"滤芯_E9", ware_area:"C区耗材区", device:"压缩机", sp_name:"空气滤芯", model:"E9-26", num:2, low_warn:3, position:"C-12"},
        {id:"螺丝_M4", ware_area:"C区耗材区", device:"装配线", sp_name:"不锈钢螺丝", model:"M4*10", num:150, low_warn:20, position:"C-05"},
        {id:"PLC_西门子", ware_area:"备品专库区", device:"自动化产线", sp_name:"可编程控制器", model:"6ES7 288-1SR40-0AA0", num:1, low_warn:2, position:"D-99"}
    ];
    const areas = ["A区货架", "B区货架", "C区耗材区", "备品专库区", "室外堆放区"];
    renderAreaSelect(areas);
    renderAreaTags(areas);
    renderStockTable(allStockData);
}

async function loadAllData() {
    await loadStockData();
    await loadAreas();
}

async function loadStockData() {
    try {
        const { data, error } = await supabase.from('spare_stock').select('*').order('sp_name');
        if (error) throw error;
        allStockData = data || [];
        localStorage.setItem('stock_backup', JSON.stringify(allStockData));
        renderStockTable(allStockData);
    } catch (err) {
        console.error('加载库存失败:', err);
        const backup = localStorage.getItem('stock_backup');
        if (backup) {
            allStockData = JSON.parse(backup);
            renderStockTable(allStockData);
        }
    }
}

async function loadAreas() {
    try {
        const { data, error } = await supabase.from('ware_areas').select('*').order('sort_order');
        if (error) throw error;
        const areas = data.map(a => a.name);
        renderAreaSelect(areas);
        renderAreaTags(areas);
    } catch (err) {
        console.error('加载分区失败:', err);
        const defaultAreas = ["A区货架", "B区货架", "C区耗材区", "备品专库区", "室外堆放区"];
        renderAreaSelect(defaultAreas);
        renderAreaTags(defaultAreas);
    }
}

async function loadHistoryData() {
    if (!supabase) {
        renderHistoryTable([]);
        return;
    }
    try {
        const { data, error } = await supabase.from('spare_history').select('*').order('hid', { ascending: false }).limit(200);
        if (error) throw error;
        currentHistoryData = data || [];
        renderHistoryTable(currentHistoryData);
    } catch (err) {
        console.error('加载历史失败:', err);
        renderHistoryTable([]);
    }
}

function renderStockTable(list) {
    const tbody = document.getElementById('stockTable');
    if (!tbody) return;
    if (!list || list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = '';
    list.forEach(item => {
        const isWarn = item.num <= item.low_warn;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="checkbox" class="rowCheck" value="${escapeHtml(item.id)}"></td>
            <td>${escapeHtml(item.id)}</td>
            <td>${escapeHtml(item.ware_area || '')}</td>
            <td>${escapeHtml(item.device)}</td>
            <td>${escapeHtml(item.sp_name)}</td>
            <td>${escapeHtml(item.model || '')}</td>
            <td class="${isWarn ? 'warn-red' : ''}">${item.num}</td>
            <td>${item.low_warn}</td>
            <td>${escapeHtml(item.position || '')}</td>
        `;
        tr.onclick = (e) => {
            if (e.target.type !== 'checkbox') {
                document.getElementById('editId').value = item.id;
                showToast(`已选中: ${item.sp_name}`);
            }
        };
        tbody.appendChild(tr);
    });
    document.getElementById('checkAll').checked = false;
}

function renderHistoryTable(historyData) {
    const tbody = document.getElementById('historyTable');
    if (!tbody) return;
    if (!historyData || historyData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">暂无记录</td></tr>';
        return;
    }
    tbody.innerHTML = '';
    historyData.forEach(rec => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="checkbox" class="historyCheck" value="${rec.hid}"></td>
            <td>${rec.hid}</td>
            <td>${escapeHtml(rec.time)}</td>
            <td>${escapeHtml(rec.type)}</td>
            <td>${escapeHtml(rec.sp_name)}</td>
            <td>${escapeHtml(rec.model || '-')}</td>
            <td>${escapeHtml(rec.device)}</td>
            <td>${rec.change_num}</td>
            <td>${escapeHtml(rec.note || '')}</td>
            <td><button class="btn-del btn-sm" data-hid="${rec.hid}">删除</button></td>
        `;
        const delBtn = tr.querySelector('button');
        delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteSingleHistory(rec.hid);
        };
        tbody.appendChild(tr);
    });
}

function searchStock() {
    const deviceKw = document.getElementById('searchDevice').value.trim();
    const spKw = document.getElementById('searchSp').value.trim();
    if (deviceKw === '' && spKw === '') {
        const filtered = allStockData.filter(item => item.num <= item.low_warn);
        renderStockTable(filtered);
    } else {
        const filtered = allStockData.filter(item => {
            const matchDev = deviceKw === '' || String(item.device).toLowerCase().includes(deviceKw.toLowerCase());
            const matchSp = spKw === '' || String(item.sp_name).toLowerCase().includes(spKw.toLowerCase()) || String(item.model).toLowerCase().includes(spKw.toLowerCase());
            return matchDev && matchSp;
        });
        renderStockTable(filtered);
    }
}

function resetSearch() {
    document.getElementById('searchDevice').value = '';
    document.getElementById('searchSp').value = '';
    renderStockTable(allStockData);
}

async function stockIn() {
    const id = document.getElementById('editId').value;
    const qty = parseInt(document.getElementById('changeNum').value);
    const remark = document.getElementById('operRemark').value.trim();
    if (!id || !qty || qty <= 0 || !remark) { alert('请选中备件，填写有效数量及备注！'); return; }
    if (!supabase) { alert('云端未连接'); return; }
    try {
        const { data: current, error: fetchError } = await supabase.from('spare_stock').select('num, sp_name, model, device').eq('id', id).single();
        if (fetchError) throw fetchError;
        const newNum = current.num + qty;
        await supabase.from('spare_stock').update({ num: newNum }).eq('id', id);
        await addHistoryRecord(current.sp_name, current.model, current.device, '增补入库', `+${qty}`, remark);
        document.getElementById('changeNum').value = '';
        document.getElementById('operRemark').value = '';
        showToast('入库成功');
        await loadStockData();
    } catch (err) { alert('操作失败: ' + err.message); }
}

async function stockOut() {
    const id = document.getElementById('editId').value;
    const qty = parseInt(document.getElementById('changeNum').value);
    const remark = document.getElementById('operRemark').value.trim();
    if (!id || !qty || qty <= 0 || !remark) { alert('请选中备件，填写有效数量及备注！'); return; }
    if (!supabase) { alert('云端未连接'); return; }
    try {
        const { data: current, error: fetchError } = await supabase.from('spare_stock').select('num, sp_name, model, device').eq('id', id).single();
        if (fetchError) throw fetchError;
        if (current.num < qty) { alert('库存不足！'); return; }
        const newNum = current.num - qty;
        await supabase.from('spare_stock').update({ num: newNum }).eq('id', id);
        await addHistoryRecord(current.sp_name, current.model, current.device, '领用出库', `-${qty}`, remark);
        document.getElementById('changeNum').value = '';
        document.getElementById('operRemark').value = '';
        showToast('出库成功');
        await loadStockData();
    } catch (err) { alert('操作失败: ' + err.message); }
}

async function addHistoryRecord(spName, model, device, type, changeStr, note) {
    if (!supabase) return;
    try {
        const hid = Date.now() + Math.floor(Math.random() * 10000);
        await supabase.from('spare_history').insert({
            hid: hid, time: new Date().toLocaleString(), type: type,
            sp_name: spName, model: model || '', device: device, change_num: changeStr, note: note
        });
    } catch (err) { console.error('保存历史失败:', err); }
}

async function addStock() {
    const area = document.getElementById('wareArea').value;
    const name = document.getElementById('spName').value.trim();
    const model = document.getElementById('spModel').value.trim();
    const device = document.getElementById('deviceName').value.trim();
    const num = parseInt(document.getElementById('spNum').value) || 0;
    const warn = parseInt(document.getElementById('lowWarn').value) || 5;
    const pos = document.getElementById('position').value.trim();
    if (!name || !device) { alert('备件名称与所属设备必填'); return; }
    const newId = name + '_' + model;
    if (!supabase) { alert('云端未连接，无法添加'); return; }
    try {
        const { error } = await supabase.from('spare_stock').insert({
            id: newId, ware_area: area, device: device, sp_name: name, model: model, num: num, low_warn: warn, position: pos
        });
        if (error) throw error;
        await addHistoryRecord(name, model, device, '初始入库', `+${num}`, '新建备件');
        alert('新建备件成功！');
        document.getElementById('spName').value = '';
        document.getElementById('spModel').value = '';
        document.getElementById('deviceName').value = '';
        document.getElementById('spNum').value = '';
        document.getElementById('position').value = '';
        await loadStockData();
    } catch (err) { alert('添加失败: ' + err.message); }
}

async function batchDelete() {
    const checks = document.querySelectorAll('.rowCheck:checked');
    if (checks.length === 0) { alert('请勾选要删除的备件'); return; }
    if (!confirm(`确认删除 ${checks.length} 条备件？不可恢复`)) return;
    if (!supabase) { alert('云端未连接'); return; }
    const delIds = Array.from(checks).map(cb => cb.value);
    try {
        await supabase.from('spare_stock').delete().in('id', delIds);
        showToast('批量删除完成');
        await loadStockData();
    } catch (err) { alert('删除失败: ' + err.message); }
}

async function deleteSingleHistory(hid) {
    if (!confirm('删除该条流水记录？')) return;
    if (!supabase) return;
    try {
        await supabase.from('spare_history').delete().eq('hid', hid);
        showToast('已删除');
        await loadHistoryData();
    } catch (err) { alert('删除失败: ' + err.message); }
}

async function batchDeleteHistory() {
    const checks = document.querySelectorAll('.historyCheck:checked');
    if (checks.length === 0) { alert('请勾选要删除的历史记录'); return; }
    if (!confirm(`确认删除 ${checks.length} 条记录？`)) return;
    if (!supabase) return;
    const delIds = Array.from(checks).map(cb => parseInt(cb.value));
    try {
        await supabase.from('spare_history').delete().in('hid', delIds);
        showToast('批量删除完成');
        await loadHistoryData();
    } catch (err) { alert('删除失败: ' + err.message); }
}

function checkAllItem() { const c = document.getElementById('checkAll').checked; document.querySelectorAll('.rowCheck').forEach(cb => cb.checked = c); }
function toggleCheckAllHistory() { const c = document.getElementById('checkAllHistory').checked; document.querySelectorAll('.historyCheck').forEach(cb => cb.checked = c); }

async function addWareArea() {
    const v = document.getElementById('newArea').value.trim();
    if (!v) return;
    if (!supabase) { alert('云端未连接'); return; }
    try {
        await supabase.from('ware_areas').insert({ name: v });
        document.getElementById('newArea').value = '';
        showToast('分区已添加');
        await loadAreas();
    } catch (err) { alert('添加失败: ' + err.message); }
}

async function editArea(idx, oldName) {
    const n = prompt('修改分区名', oldName);
    if (n && n.trim() && n !== oldName) {
        if (!supabase) return;
        try {
            await supabase.from('ware_areas').update({ name: n.trim() }).eq('name', oldName);
            await supabase.from('spare_stock').update({ ware_area: n.trim() }).eq('ware_area', oldName);
            await loadAreas();
            await loadStockData();
            showToast('分区已更新');
        } catch (err) { alert('更新失败: ' + err.message); }
    }
}

async function delArea(idx, name) {
    if (!confirm(`删除分区 "${name}"？`)) return;
    if (!supabase) return;
    try {
        await supabase.from('ware_areas').delete().eq('name', name);
        await loadAreas();
        showToast('分区已删除');
    } catch (err) { alert('删除失败: ' + err.message); }
}

function renderAreaSelect(areas) {
    const sel = document.getElementById('wareArea');
    if (!sel) return;
    sel.innerHTML = '<option value="">选择仓库分区</option>' + areas.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
}

function renderAreaTags(areas) {
    const box = document.getElementById('areaTagList');
    if (!box) return;
    box.innerHTML = areas.map((item, idx) => `<span class="tag-item">${escapeHtml(item)} <button class="btn-sm btn-edit-text" data-idx="${idx}" data-name="${escapeHtml(item)}">改</button><button class="btn-sm btn-del" data-idx="${idx}" data-name="${escapeHtml(item)}">删</button></span>`).join('');
    Array.from(box.querySelectorAll('.btn-edit-text')).forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); const name = btn.getAttribute('data-name'); editArea(null, name); };
    });
    Array.from(box.querySelectorAll('.btn-del')).forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); const name = btn.getAttribute('data-name'); delArea(null, name); };
    });
}

function toggleAllStockTable() {
    const box = document.getElementById('allStockBox');
    if (box.style.display === 'block') { box.style.display = 'none'; }
    else { box.style.display = 'block'; renderAllStockTable(); }
}

function renderAllStockTable() {
    const tb = document.getElementById('allStockTableBody');
    if (!tb) return;
    tb.innerHTML = allStockData.map(item => {
        const warnFlag = item.num <= item.low_warn;
        return `<tr>
            <td>${escapeHtml(item.id)}</td><td>${escapeHtml(item.ware_area || '')}</td><td>${escapeHtml(item.device)}</td>
            <td>${escapeHtml(item.sp_name)}</td><td>${escapeHtml(item.model || '')}</td>
            <td class="${warnFlag ? 'warn-red' : ''}">${item.num}</td><td>${item.low_warn}</td>
            <td>${escapeHtml(item.position || '')}</td>
            <td><button class="btn-edit-text btn-sm" data-id="${item.id}">修改</button></td>
        </tr>`;
    }).join('');
    tb.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => openEditModal(btn.getAttribute('data-id'));
    });
}

function openEditModal(id) {
    const item = allStockData.find(i => i.id === id);
    if (item) {
        document.getElementById('modalEditId').value = id;
        document.getElementById('modalWareArea').value = item.ware_area || '';
        document.getElementById('modalDevice').value = item.device || '';
        document.getElementById('modalSpName').value = item.sp_name || '';
        document.getElementById('modalModel').value = item.model || '';
        document.getElementById('modalNum').value = item.num;
        document.getElementById('modalWarn').value = item.low_warn;
        document.getElementById('modalPos').value = item.position || '';
        document.getElementById('editModal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
    document.getElementById('modalOverlay').style.display = 'none';
}

async function saveEditInfo() {
    const id = document.getElementById('modalEditId').value;
    const wareArea = document.getElementById('modalWareArea').value.trim();
    const device = document.getElementById('modalDevice').value.trim();
    const spName = document.getElementById('modalSpName').value.trim();
    const model = document.getElementById('modalModel').value.trim();
    const num = parseInt(document.getElementById('modalNum').value) || 0;
    const lowWarn = parseInt(document.getElementById('modalWarn').value) || 0;
    const position = document.getElementById('modalPos').value.trim();
    if (!supabase) { alert('云端未连接'); return; }
    try {
        await supabase.from('spare_stock').update({ ware_area: wareArea, device, sp_name: spName, model, num, low_warn: lowWarn, position }).eq('id', id);
        closeEditModal();
        showToast('修改成功');
        await loadStockData();
    } catch (err) { alert('修改失败: ' + err.message); }
}

async function importExcelData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);
        if (!supabase) { alert('云端未连接'); return; }
        let importedCount = 0;
        for (const row of rows) {
            const name = row.备件名称 || '';
            const model = row.型号 || '';
            const device = row.所属设备 || '';
            if (!name || !device) continue;
            const newId = name + '_' + model;
            const newItem = { id: newId, ware_area: row.仓库分区 || '', device, sp_name: name, model, num: parseInt(row.数量) || 0, low_warn: parseInt(row.预警数) || 5, position: row.存放位置 || '' };
            try {
                const { data: existing } = await supabase.from('spare_stock').select('id').eq('id', newId);
                if (existing && existing.length > 0) {
                    const { data: current } = await supabase.from('spare_stock').select('num').eq('id', newId).single();
                    if (current) await supabase.from('spare_stock').update({ num: current.num + newItem.num }).eq('id', newId);
                } else { await supabase.from('spare_stock').insert(newItem); }
                await addHistoryRecord(name, model, device, '批量导入', `+${newItem.num}`, 'Excel导入');
                importedCount++;
            } catch (err) { console.error(err); }
        }
        alert(`导入完成！成功 ${importedCount} 条`);
        document.getElementById('importFile').value = '';
        await loadStockData();
    };
    reader.readAsArrayBuffer(file);
}

function exportStockExcel() {
    const exportData = allStockData.map(item => ({ 'ID': item.id, '仓库分区': item.ware_area, '所属设备': item.device, '备件名称': item.sp_name, '型号': item.model, '当前库存': item.num, '预警下限': item.low_warn, '存放位置': item.position }));
    if (exportData.length === 0) { alert('无数据'); return; }
    const ws = XLSX.utils.json_to_sheet(exportData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '备件库存总表');
    XLSX.writeFile(wb, `备件库存总表_${new Date().toLocaleDateString()}.xlsx`);
    showToast('导出成功');
}

async function exportHistoryExcel() {
    if (!supabase) { alert('云端未连接'); return; }
    try {
        const { data } = await supabase.from('spare_history').select('*').order('hid', { ascending: false });
        const exportData = (data || []).map(item => ({ '流水编号': item.hid, '操作时间': item.time, '操作类型': item.type, '备件名称': item.sp_name, '型号': item.model, '所属设备': item.device, '变动数量': item.change_num, '操作备注': item.note }));
        if (exportData.length === 0) { alert('无记录'); return; }
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '出入库历史');
        XLSX.writeFile(wb, `出入库历史_${new Date().toLocaleDateString()}.xlsx`);
        showToast('导出成功');
    } catch (err) { alert('导出失败: ' + err.message); }
}

function switchTab(idx) {
    const tabs = document.querySelectorAll('.tab');
    const btns = document.querySelectorAll('.tab-btn');
    for (let i = 0; i < tabs.length; i++) {
        if (i === idx) { tabs[i].classList.add('active'); btns[i].classList.add('active'); }
        else { tabs[i].classList.remove('active'); btns[i].classList.remove('active'); }
    }
    if (idx === 1 && supabase) loadHistoryData();
}

function toggleFold() { const el = document.getElementById('inputFold'); el.classList.toggle('fold-close'); el.classList.toggle('fold-open'); }
function toggleBaseFold() { const el = document.getElementById('baseFold'); el.classList.toggle('fold-close'); el.classList.toggle('fold-open'); }
function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
function showToast(msg) { const t = document.createElement('div'); t.innerText = msg; t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c3e50;color:white;padding:6px 16px;border-radius:30px;z-index:9999;font-size:12px'; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
init();
</script>
