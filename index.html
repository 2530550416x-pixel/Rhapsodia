<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备备件库存管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{background:#f5f7fa;padding:15px}
.container{max-width:1300px;margin:0 auto;background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 10px #eee}
h2{text-align:center;color:#2c3e50;margin-bottom:20px}
.box{margin-bottom:25px;padding:15px;border:1px solid #e8e8e8;border-radius:8px}
.title{font-size:16px;font-weight:bold;margin-bottom:12px;color:#3498db;display:flex;justify-content:space-between;align-items:center}
.fold-btn{cursor:pointer;color:#0066cc;font-size:14px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
input,select,textarea{flex:1;min-width:160px;padding:9px;border:1px solid #ddd;border-radius:5px;outline:none}
textarea{resize:none;height:60px}
button{padding:9px 12px;border:none;border-radius:5px;cursor:pointer;color:#fff;font-size:14px}
.btn-add{background:#27ae60}
.btn-out{background:#e67e22}
.btn-search{background:#3498db}
.btn-export{background:#9b59b6}
.btn-del{background:#e74c3c}
.btn-reset{background:#f39c12}
.btn-his{background:#8e44ad}
.btn-edit-text{background:#6c757d}
.btn-sm{padding:4px 8px;font-size:12px}
.tag-item{display:inline-block;padding:3px 8px;border:1px solid #ccc;border-radius:3px;margin:3px;cursor:pointer}
.tag-item:hover{background:#f0f0f0}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #eee;padding:8px;text-align:center;font-size:13px}
th{background:#f0f5ff}
/* 7. & 8. 预警物料改为红色字体 */
.warn-text{color:#ff0000 !important;font-weight:bold}
.tab{display:none}
.tab.active{display:block}
.tab-btn{margin:0 5px;padding:8px 15px;background:#eee;border:none;border-radius:5px;cursor:pointer}
.tab-btn.active{background:#3498db;color:#fff}
.fold-content{overflow:hidden;transition:all 0.3s ease}
.fold-close{max-height:0}
.fold-open{max-height:800px}
.edit-box{display:flex;gap:8px;align-items:center}
.check-item{width:16px;height:16px;cursor:pointer}
@media(max-width:768px){.row{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <h2>设备备件库存管理系统</h2>
  <div style="text-align:center;margin-bottom:15px">
    <button class="tab-btn active" onclick="switchTab(0)">库存管理</button>
    <button class="tab-btn" onclick="switchTab(1)">出入库历史记录</button>
  </div>

  <!-- 1. 库存管理 Tab -->
  <div class="tab active" id="tab0">
    <!-- 1.1 库存精准查询 -->
    <div class="box">
      <div class="title">库存精准查询</div>
      <div class="row">
        <input type="text" id="searchDevice" placeholder="所属设备查询">
        <input type="text" id="searchSp" placeholder="备件名/型号搜索">
        <button class="btn-search" onclick="searchStock()">查询</button>
        <button class="btn-reset" onclick="resetSearch()">重置</button>
        <button class="btn-del btn-sm" onclick="batchDelete()">批量删除选中</button>
      </div>
    </div>

    <!-- 1.2 筛选结果清单 (3. 移除操作列) -->
    <div class="box">
      <div class="title">筛选结果清单 <span style="color:red">红色字体 = 低于预警库存</span></div>
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" class="check-item" id="checkAll" onclick="checkAllItem()">全选</th>
            <th>ID</th>
            <th>仓库分区</th>
            <th>所属设备</th>
            <th>备件名称</th>
            <th>型号</th>
            <th>当前库存</th>
            <th>预警下限</th>
            <th>存放位置</th>
          </tr>
        </thead>
        <tbody id="stockTable">
          <!-- 2. 默认不显示数据 -->
          <tr class="empty-row"><td colspan="9" style="color:#999">暂无数据，请点击查询</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 1.3 备件入库 / 领用出库 -->
    <div class="box">
      <div class="title">备件入库 / 领用出库</div>
      <div class="row">
        <input type="text" id="editId" placeholder="备件ID" readonly>
        <input type="number" id="changeNum" placeholder="操作数量" min="1">
        <textarea id="operRemark" placeholder="本次操作备注"></textarea>
      </div>
      <div class="row">
        <button class="btn-add" onclick="stockIn()">增补入库</button>
        <button class="btn-out" onclick="stockOut()">领用出库</button>
      </div>
    </div>

    <!-- 库存总表一键查看 -->
    <div class="box">
      <div class="title">库存总表一键查看</div>
      <div class="row">
        <button class="btn-search" onclick="openAllStockTable()">显示库存总表</button>
        <button class="btn-del" onclick="hideAllStockTable()">隐藏库存总表</button>
        <button class="btn-export" onclick="exportStockExcel()">导出全部库存总表</button>
      </div>
      <div id="allStockBox" style="display:none;margin-top:15px">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>仓库分区</th>
              <th>所属设备</th>
              <th>备件名</th>
              <th>型号</th>
              <th>库存</th>
              <th>预警值</th>
              <th>存放位置</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="allStockTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:8px;box-shadow:0 0 15px #999;z-index:999;width:420px">
      <h3 style="margin-bottom:15px;text-align:center">修改备件信息</h3>
      <input type="hidden" id="modalEditId">
      <div class="row">
        <input type="text" id="modalWareArea" placeholder="仓库分区">
        <input type="text" id="modalDevice" placeholder="所属设备">
      </div>
      <div class="row">
        <input type="text" id="modalSpName" placeholder="备件名称">
        <input type="text" id="modalModel" placeholder="备件型号">
      </div>
      <div class="row">
        <input type="number" id="modalNum" placeholder="库存数量" min="0">
        <input type="number" id="modalWarn" placeholder="预警数量" min="0">
      </div>
      <div class="row">
        <input type="text" id="modalPos" placeholder="存放位置">
      </div>
      <div class="row" style="justify-content:center;margin-top:15px">
        <button class="btn-add" onclick="saveEditInfo()">保存修改</button>
        <button class="btn-reset" onclick="closeEditModal()">取消</button>
      </div>
    </div>

    <!-- 备件信息录入 -->
    <div class="box">
      <div class="title"> 备件信息录入 <span class="fold-btn" onclick="toggleFold()">点击展开/折叠</span> </div>
      <div class="fold-content fold-close" id="inputFold">
        <div class="row">
          <select id="wareArea"></select>
          <input type="text" id="spName" placeholder="备件名称">
          <input type="text" id="spModel" placeholder="备件型号">
        </div>
        <div class="row">
          <input type="text" id="deviceName" placeholder="所属设备名称">
          <input type="number" id="spNum" placeholder="初始库存数量" min="0">
          <input type="number" id="lowWarn" placeholder="最低预警数量" min="0" value="5">
          <input type="text" id="position" placeholder="具体存放位置">
        </div>
        <div class="row">
          <button class="btn-add" onclick="addStock()">新建备件入库</button>
        </div>
        <div class="row" style="margin-top:10px">
          <input type="file" id="importFile" accept=".xlsx,.xls" onchange="importExcelData()">
          <button class="btn-his" onclick="alert('导入模板字段：仓库分区、备件名称、型号、所属设备、数量、预警数、存放位置')">查看导入说明</button>
        </div>
      </div>
    </div>

    <!-- 基础数据管理 -->
    <div class="box">
      <div class="title"> 基础数据管理（新增/修改/删除） <span class="fold-btn" onclick="toggleBaseFold()">点击展开/折叠</span> </div>
      <div class="fold-content fold-close" id="baseFold">
        <div class="row edit-box">
          <input type="text" id="newArea" placeholder="新增仓库分区">
          <button class="btn-edit-text" onclick="addWareArea()">添加分区</button>
        </div>
        <div class="row">
          <span>现有分区（点击修改/删除）：</span>
          <div id="areaTagList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. 出入库历史记录 Tab -->
  <div class="tab" id="tab1">
    <div class="box">
      <div class="title">出入库流水记录</div>
      <div style="text-align:right;margin-bottom:10px">
        <button class="btn-del btn-sm" onclick="batchDeleteHistory()">批量删除</button>
        <button class="btn-his" onclick="exportHistoryExcel()">导出全部历史记录</button>
      </div>
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" class="check-item" id="checkAllHis" onclick="checkAllHistory()">全选</th>
            <th>流水编号</th>
            <th>操作时间</th>
            <th>操作类型</th>
            <th>备件名称</th>
            <th>型号</th> <!-- 5. 增加型号列 -->
            <th>所属设备</th>
            <th>变动数量</th> <!-- 6. 变动数量 +/- -->
            <th>操作备注</th>
            <th>操作</th> <!-- 4. 单条删除按钮列 -->
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const HISTORY_KEY = "spare_oper_history";
const AREA_KEY = "ware_area_list";
const STOCK_KEY = "spare_stock_data";

// ================= 初始化与基础逻辑 =================
function initBaseData(){
  if(!localStorage.getItem(AREA_KEY)){
    localStorage.setItem(AREA_KEY,JSON.stringify(["A区货架","B区货架","C区耗材区","备品专库区","室外堆放区"]));
  }
  renderAreaSelect();
  renderAreaTags();
}
initBaseData();

window.onload=function(){
  renderAreaSelect();
  renderAreaTags();
  renderHistory();
}

function switchTab(idx){
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",i===idx));
  document.querySelectorAll(".tab-btn").forEach((el,i)=>el.classList.toggle("active",i===idx));
  if(idx===1) renderHistory();
}

// ================= 库存管理核心逻辑 =================
// 【核心修复】使用 String() 包裹输入框的值，完美解决输入纯数字时无法识别的问题
function searchStock(){
    let dKey = String(document.getElementById("searchDevice").value || '').trim().toLowerCase();
    let sKey = String(document.getElementById("searchSp").value || '').trim().toLowerCase();
    
    let all = getStockData();
    let res = [];

    if (dKey === '' && sKey === '') {
        // 1. 未输入任何条件，仅显示等于或小于预警下限的物料
        res = all.filter(item => item.num <= item.lowWarn);
    } else {
        // 正常关键字过滤（增强容错）
        res = all.filter(item=>{
            // 确保原始数据存在且转换为字符串，防止因数据类型不是字符串而报错或失效
            let deviceStr = String(item.device || '').toLowerCase();
            let spNameStr = String(item.spName || '').toLowerCase();
            let modelStr = String(item.model || '').toLowerCase();
            
            // 只要设备名、备件名、型号中包含任意一个关键字即可匹配
            let matchDev = dKey === '' || deviceStr.includes(dKey);
            let matchSp = sKey === '' || spNameStr.includes(sKey) || modelStr.includes(sKey);
            
            return matchDev && matchSp;
        });
    }
    renderTable(res);
}

// 3. 点击数据行自动选中备件并填充至操作区
function selectRow(id, name, model) {
  document.getElementById("editId").value = id;
  console.log(`已选中：${name} (${model})`);
}

// 3. 移除操作列，点击整行选中；7. & 8. 预警物料改为红色字体
function renderTable(list){
  let tb = document.getElementById("stockTable");
  tb.innerHTML = "";
  
  if(!list.length) {
    tb.innerHTML = '<tr><td colspan="9" style="color:#999;text-align:center">未查询到符合条件的物料</td></tr>';
    return;
  } 
  
  list.forEach(item=>{
    let tr = document.createElement("tr");
    
    // 7. & 8. 红色字体预警
    if(item.num <= item.lowWarn) tr.className = "warn-text"; 
    
    // 3. 给整行添加点击事件
    tr.onclick = function(e) {
      // 防止点击复选框时触发选中
      if (e.target.type !== 'checkbox') {
        selectRow(item.id, item.spName, item.model);
      }
    };
    
    tr.innerHTML = `
      <td><input type="checkbox" class="check-item rowCheck" value="${item.id}"></td>
      <td>${item.id}</td>
      <td>${item.wareArea}</td>
      <td>${item.device}</td>
      <td>${item.spName}</td>
      <td>${item.model}</td>
      <td>${item.num}</td>
      <td>${item.lowWarn}</td>
      <td>${item.position}</td>
    `;
    tb.appendChild(tr);
  });
}

function getStockData(){ let d = localStorage.getItem(STOCK_KEY); return d ? JSON.parse(d) : []; }
function saveStockData(arr){ localStorage.setItem(STOCK_KEY,JSON.stringify(arr)); }
function checkAllItem(){ let allCheck = document.getElementById("checkAll").checked; let checks = document.querySelectorAll(".rowCheck"); checks.forEach(c=>c.checked = allCheck); }

function batchDelete(){
  let checks = document.querySelectorAll(".rowCheck:checked");
  if(checks.length === 0){ alert("请先勾选要删除的数据"); return; }
  if(!confirm(`确定批量删除选中 ${checks.length} 条备件？不可恢复`))return;
  let delIds = []; checks.forEach(c=>delIds.push(c.value));
  let list = getStockData(); list = list.filter(item=>!delIds.includes(item.id));
  saveStockData(list); searchStock(); document.getElementById("checkAll").checked = false;
  alert("批量删除完成");
}

function resetSearch(){
  document.getElementById("searchDevice").value="";
  document.getElementById("searchSp").value="";
  document.getElementById("stockTable").innerHTML = '<tr class="empty-row"><td colspan="9" style="color:#999;text-align:center">暂无数据，请点击查询</td></tr>';
  document.getElementById("checkAll").checked = false;
}

// ================= 入库 / 出库 逻辑 =================
function stockIn(){
  let id = document.getElementById("editId").value;
  let inNum = parseInt(document.getElementById("changeNum").value);
  let note = document.getElementById("operRemark").value.trim();
  if(!id||!inNum||!note){alert("请选中备件、填写数量与备注！");return;}
  
  let list = getStockData();
  let idx = list.findIndex(v=>v.id===id);
  if(idx===-1){alert("未找到备件");return;}
  
  list[idx].num += inNum;
  saveStockData(list);
  
  // 生成历史记录
  let his = getHistoryData();
  his.unshift({
    hid:Date.now(),
    time:new Date().toLocaleString(),
    type:"增补入库",
    spName:list[idx].spName,
    model: list[idx].model, // 5. 记录型号
    device:list[idx].device,
    changeNum:inNum,
    note
  });
  saveHistoryData(his);
  
  alert("入库成功！");
  document.getElementById("changeNum").value="";
  document.getElementById("operRemark").value="";
  searchStock();
}

function stockOut(){
  let id = document.getElementById("editId").value;
  let outNum = parseInt(document.getElementById("changeNum").value);
  let note = document.getElementById("operRemark").value.trim();
  if(!id||!outNum||!note){alert("请选中备件、填写数量与备注！");return;}
  
  let list = getStockData();
  let idx = list.findIndex(v=>v.id===id);
  if(idx===-1){alert("未找到备件");return;}
  if(list[idx].num < outNum){alert("库存不足！");return;}
  
  list[idx].num -= outNum;
  saveStockData(list);
  
  // 生成历史记录
  let his = getHistoryData();
  his.unshift({
    hid:Date.now(),
    time:new Date().toLocaleString(),
    type:"领用出库",
    spName:list[idx].spName,
    model: list[idx].model, // 5. 记录型号
    device:list[idx].device,
    changeNum:outNum,
    note
  });
  saveHistoryData(his);
  
  alert("出库成功！");
  document.getElementById("changeNum").value="";
  document.getElementById("operRemark").value="";
  searchStock();
  if(document.getElementById("allStockBox").style.display === "block"){
    openAllStockTable();
  }
}

// ================= 历史记录模块 (4, 5, 6) =================
function renderHistory(){
  let hisList = getHistoryData();
  let tb = document.getElementById("historyTable");
  tb.innerHTML="";
  
  // 【核心修复】严格按照操作时间降序排列（最新的在最上面）
  // 将时间字符串转为 Date 对象进行比较，确保无论何时添加的数据都能正确排序
  hisList.sort((a, b) => new Date(b.time) - new Date(a.time));
  
  hisList.forEach(h=>{
    let tr=document.createElement("tr");
    // 6. 变动数量 +/-
    let numDisplay = h.type.includes("入库") || h.type.includes("录入") ? `+${h.changeNum}` : `-${h.changeNum}`;
    tr.innerHTML=`
      <td><input type="checkbox" class="check-item rowCheckHis" value="${h.hid}"></td>
      <td>${h.hid}</td>
      <td>${h.time}</td>
      <td>${h.type}</td>
      <td>${h.spName}</td>
      <td>${h.model || '-'}</td> <!-- 5. 型号列 -->
      <td>${h.device}</td>
      <td>${numDisplay}</td> <!-- 6. 变动数量 -->
      <td>${h.note || '-'}</td>
      <td><button class="btn-del btn-sm" onclick="deleteHistory(${h.hid})">删除</button></td> <!-- 4. 单条删除 -->
    `;
    tb.appendChild(tr);
  });
}

function checkAllHistory(){
  let allCheck = document.getElementById("checkAllHis").checked;
  let checks = document.querySelectorAll(".rowCheckHis");
  checks.forEach(c=>c.checked = allCheck);
}

// 4. 批量删除历史记录
function batchDeleteHistory(){
  let checks = document.querySelectorAll(".rowCheckHis:checked");
  if(checks.length === 0){ alert("请先勾选要删除的记录"); return; }
  if(!confirm(`确定批量删除选中 ${checks.length} 条历史记录？`))return;
  
  let delIds = [];
  checks.forEach(c=>delIds.push(parseInt(c.value)));
  
  let his = getHistoryData();
  his = his.filter(item => !delIds.includes(item.hid));
  
  saveHistoryData(his);
  renderHistory(); // 4. 实时刷新
  document.getElementById("checkAllHis").checked = false;
  alert("批量删除成功！");
}

// 4. 单条删除历史记录
function deleteHistory(hid){
  if(!confirm("确定要删除此条记录吗？")) return;
  let his = getHistoryData();
  let filtered = his.filter(item => item.hid !== hid);
  saveHistoryData(filtered);
  renderHistory(); // 4. 实时刷新
}

function getHistoryData(){ let d = localStorage.getItem(HISTORY_KEY); return d ? JSON.parse(d) : []; }
function saveHistoryData(arr){ localStorage.setItem(HISTORY_KEY,JSON.stringify(arr)); }

// ================= 导出 Excel =================
function exportStockExcel(){
  let data=getStockData();
  if(data.length===0){alert("暂无数据");return;}
  let exportData = data.map(item => ({
    ID: item.id, 仓库分区: item.wareArea, 所属设备: item.device, 
    备件名称: item.spName, 型号: item.model, 库存: item.num, 
    预警下限: item.lowWarn, 存放位置: item.position
  }));
  let ws = XLSX.utils.json_to_sheet(exportData);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "库存总表");
  XLSX.writeFile(wb, `备件库存_${new Date().toLocaleDateString()}.xlsx`);
}

function exportHistoryExcel(){
  let data=getHistoryData();
  if(data.length===0){alert("暂无历史记录");return;}
  let exportData = data.map(item => ({
    流水编号: item.hid, 操作时间: item.time, 操作类型: item.type,
    备件名称: item.spName, 型号: item.model, 所属设备: item.device,
    变动数量: item.changeNum, 操作备注: item.note
  }));
  let ws = XLSX.utils.json_to_sheet(exportData);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "出入库历史");
  XLSX.writeFile(wb, `出入库记录_${new Date().toLocaleDateString()}.xlsx`);
}

// ================= 库存总表查看/编辑 =================
function openAllStockTable(){
  let box = document.getElementById("allStockBox");
  box.style.display = "block";
  let list = getStockData();
  let tb = document.getElementById("allStockTableBody");
  tb.innerHTML = "";
  
  list.forEach(item=>{
    let tr = document.createElement("tr");
    if(item.num <= item.lowWarn) tr.className = "warn-text";
    tr.innerHTML = `
      <td>${item.id}</td>
      <td>${item.wareArea}</td>
      <td>${item.device}</td>
      <td>${item.spName}</td>
      <td>${item.model}</td>
      <td>${item.num}</td>
      <td>${item.lowWarn}</td>
      <td>${item.position}</td>
      <td><button class="btn-edit-text btn-sm" onclick="openEditModal('${item.id}')">编辑</button></td>
    `;
    tb.appendChild(tr);
  });
}

function hideAllStockTable(){
  document.getElementById("allStockBox").style.display = "none";
}

function openEditModal(id){
  let list = getStockData();
  let item = list.find(v=>v.id===id);
  if(!item) return;
  
  document.getElementById("modalEditId").value = id;
  document.getElementById("modalWareArea").value = item.wareArea;
  document.getElementById("modalDevice").value = item.device;
  document.getElementById("modalSpName").value = item.spName;
  document.getElementById("modalModel").value = item.model;
  document.getElementById("modalNum").value = item.num;
  document.getElementById("modalWarn").value = item.lowWarn;
  document.getElementById("modalPos").value = item.position;
  
  document.getElementById("editModal").style.display = "block";
}

function closeEditModal(){
  document.getElementById("editModal").style.display = "none";
}

function saveEditInfo(){
  let id = document.getElementById("modalEditId").value;
  let wareArea = document.getElementById("modalWareArea").value.trim();
  let device = document.getElementById("modalDevice").value.trim();
  let spName = document.getElementById("modalSpName").value.trim();
  let model = document.getElementById("modalModel").value.trim();
  let num = parseInt(document.getElementById("modalNum").value);
  let warn = parseInt(document.getElementById("modalWarn").value);
  let pos = document.getElementById("modalPos").value.trim();
  
  if(!wareArea||!device||!spName||!model||isNaN(num)||isNaN(warn)||!pos){
    alert("请填写完整且有效的信息！");
    return;
  }
  
  let list = getStockData();
  let idx = list.findIndex(v=>v.id===id);
  if(idx===-1){alert("未找到备件");return;}
  
  list[idx] = {
    ...list[idx],
    wareArea, device, spName, model, num, lowWarn:warn, position:pos
  };
  
  saveStockData(list);
  closeEditModal();
  openAllStockTable();
  searchStock();
  alert("修改成功！");
}

// ================= 备件录入/导入 =================
function toggleFold(){
  let el = document.getElementById("inputFold");
  el.classList.toggle("fold-close");
  el.classList.toggle("fold-open");
}

function toggleBaseFold(){
  let el = document.getElementById("baseFold");
  el.classList.toggle("fold-close");
  el.classList.toggle("fold-open");
}

function renderAreaSelect(){
  let areaList = JSON.parse(localStorage.getItem(AREA_KEY) || "[]");
  let sel = document.getElementById("wareArea");
  sel.innerHTML = "";
  areaList.forEach(area=>{
    let opt = document.createElement("option");
    opt.value = area;
    opt.textContent = area;
    sel.appendChild(opt);
  });
}

function renderAreaTags(){
  let areaList = JSON.parse(localStorage.getItem(AREA_KEY) || "[]");
  let tagBox = document.getElementById("areaTagList");
  tagBox.innerHTML = "";
  areaList.forEach(area=>{
    let tag = document.createElement("span");
    tag.className = "tag-item";
    tag.innerHTML = `${area} 
      <span style="color:#e74c3c;cursor:pointer;margin-left:5px" onclick="editArea('${area}')">✏️</span>
      <span style="color:#e74c3c;cursor:pointer;margin-left:5px" onclick="delArea('${area}')">🗑️</span>`;
    tagBox.appendChild(tag);
  });
}

function addWareArea(){
  let newArea = document.getElementById("newArea").value.trim();
  if(!newArea){alert("请输入分区名称");return;}
  let areaList = JSON.parse(localStorage.getItem(AREA_KEY) || "[]");
  if(areaList.includes(newArea)){alert("分区已存在");return;}
  areaList.push(newArea);
  localStorage.setItem(AREA_KEY, JSON.stringify(areaList));
  renderAreaSelect();
  renderAreaTags();
  document.getElementById("newArea").value = "";
  alert("添加成功！");
}

function editArea(oldName){
  let newName = prompt("修改分区名称", oldName);
  if(!newName||newName.trim()==="") return;
  newName = newName.trim();
  let areaList = JSON.parse(localStorage.getItem(AREA_KEY) || "[]");
  if(areaList.includes(newName)){alert("新名称已存在");return;}
  let idx = areaList.findIndex(v=>v===oldName);
  if(idx===-1) return;
  areaList[idx] = newName;
  localStorage.setItem(AREA_KEY, JSON.stringify(areaList));
  
  // 同步更新库存数据中的分区名称
  let stockList = getStockData();
  stockList = stockList.map(item=>{
    if(item.wareArea===oldName) return {...item, wareArea:newName};
    return item;
  });
  saveStockData(stockList);
  
  renderAreaSelect();
  renderAreaTags();
  alert("修改成功！");
}

function delArea(name){
  if(!confirm(`确定删除分区【${name}】吗？`)) return;
  let areaList = JSON.parse(localStorage.getItem(AREA_KEY) || "[]");
  areaList = areaList.filter(v=>v!==name);
  localStorage.setItem(AREA_KEY, JSON.stringify(areaList));
  renderAreaSelect();
  renderAreaTags();
  alert("删除成功！");
}

function addStock(){
  let wareArea = document.getElementById("wareArea").value;
  let spName = document.getElementById("spName").value.trim();
  let model = document.getElementById("spModel").value.trim();
  let device = document.getElementById("deviceName").value.trim();
  let num = parseInt(document.getElementById("spNum").value);
  let lowWarn = parseInt(document.getElementById("lowWarn").value);
  let position = document.getElementById("position").value.trim();
  
  if(!wareArea||!spName||!model||!device||isNaN(num)||isNaN(lowWarn)||!position){
    alert("请填写完整且有效的信息！");
    return;
  }
  
  let list = getStockData();
  let newId = list.length ? (Math.max(...list.map(item=>parseInt(item.id))) + 1).toString() : "1";
  
  list.push({
    id: newId,
    wareArea,
    spName,
    model,
    device,
    num,
    lowWarn,
    position
  });
  
  saveStockData(list);
  
  // 生成入库历史记录
  let his = getHistoryData();
  his.unshift({
    hid:Date.now(),
    time:new Date().toLocaleString(),
    type:"初始录入",
    spName,
    model,
    device,
    changeNum:num,
    note:"新建备件初始入库"
  });
  saveHistoryData(his);
  
  alert("新增备件入库成功！");
  document.getElementById("spName").value = "";
  document.getElementById("spModel").value = "";
  document.getElementById("deviceName").value = "";
  document.getElementById("spNum").value = "";
  document.getElementById("lowWarn").value = "5";
  document.getElementById("position").value = "";
  searchStock();
}

function importExcelData(){
  let file = document.getElementById("importFile").files[0];
  if(!file) return;
  let reader = new FileReader();
  reader.onload = function(e){
    try{
      let data = new Uint8Array(e.target.result);
      let wb = XLSX.read(data, {type:"array"});
      let wsname = wb.SheetNames[0];
      let ws = wb.Sheets[wsname];
      let json = XLSX.utils.sheet_to_json(ws);
      
      if(json.length===0){alert("Excel中无数据");return;}
      
      let stockList = getStockData();
      let hisList = getHistoryData();
      let newId = stockList.length ? (Math.max(...stockList.map(item=>parseInt(item.id))) + 1) : 1;
      
      json.forEach(item=>{
        let wareArea = item["仓库分区"] || "";
        let spName = item["备件名称"] || "";
        let model = item["型号"] || "";
        let device = item["所属设备"] || "";
        let num = parseInt(item["数量"]) || 0;
        let lowWarn = parseInt(item["预警数"]) || 5;
        let position = item["存放位置"] || "";
        
        if(!wareArea||!spName||!model||!device||!position) return;
        
        stockList.push({
          id: newId.toString(),
          wareArea,
          spName,
          model,
          device,
          num,
          lowWarn,
          position
        });
        
        // 生成导入历史记录
        hisList.unshift({
          hid:Date.now(),
          time:new Date().toLocaleString(),
          type:"Excel导入",
          spName,
          model,
          device,
          changeNum:num,
          note:"Excel批量导入入库"
        });
        
        newId++;
      });
      
      saveStockData(stockList);
      saveHistoryData(hisList);
      alert(`成功导入 ${json.length} 条备件数据！`);
      document.getElementById("importFile").value = "";
      searchStock();
    }catch(e){
      console.error(e);
      alert("导入失败，请检查Excel格式是否正确！");
    }
  };
  reader.readAsArrayBuffer(file);
}
</script>
